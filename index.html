<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vanogram | Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        /* Контейнер приложения */
        .app {
            display: flex;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Список контактов */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e4e6eb;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px 16px;
            background: white;
            border-bottom: 1px solid #e4e6eb;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
            color: #050505;
        }

        .user-status {
            font-size: 13px;
            color: #65676b;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #31a24c;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .search-box {
            padding: 12px 16px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: #f0f2f5;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #e4e6eb;
        }

        .chat-item:hover {
            background: #f0f2f5;
        }

        .chat-item.active {
            background: #e7f3ff;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            color: #050505;
            margin-bottom: 4px;
        }

        .chat-last-msg {
            font-size: 13px;
            color: #65676b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Основная область чата */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f0f2f5;
        }

        .chat-header {
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e4e6eb;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 18px;
            color: #050505;
        }

        .chat-header-status {
            font-size: 13px;
            color: #65676b;
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 65%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #3390ec;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: white;
            color: #050505;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .message-info {
            font-size: 11px;
            color: #65676b;
            margin: 4px 8px 0;
        }

        .sent .message-info {
            text-align: right;
        }

        .message-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
            color: #3390ec;
        }

        /* Ввод сообщения */
        .input-area {
            background: white;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #e4e6eb;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 12px;
            background: #f0f2f5;
            border-radius: 28px;
            padding: 8px 16px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: #65676b;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: #e4e6eb;
        }

        #messageInput {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: #050505;
            font-size: 15px;
            outline: none;
        }

        #messageInput::placeholder {
            color: #65676b;
        }

        #sendBtn {
            background: #3390ec;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        /* Экран входа */
        .login-screen {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .login-screen h1 {
            color: #3390ec;
            margin-bottom: 12px;
            font-size: 36px;
        }

        .login-screen p {
            color: #65676b;
            margin-bottom: 32px;
        }

        .login-screen input {
            width: 100%;
            padding: 16px;
            background: #f0f2f5;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            margin-bottom: 16px;
            text-align: center;
            outline: none;
        }

        .login-screen button {
            width: 100%;
            padding: 16px;
            background: #3390ec;
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .error {
            color: #e53935;
            font-size: 13px;
            margin-top: 12px;
        }

        .hidden {
            display: none;
        }

        /* Кнопка меню для телефона */
        .menu-btn {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 85%;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-btn {
                display: flex;
                position: fixed;
                left: 16px;
                top: 16px;
                z-index: 1001;
                background: #3390ec;
                border: none;
                width: 44px;
                height: 44px;
                border-radius: 50%;
                color: white;
                font-size: 20px;
                cursor: pointer;
                align-items: center;
                justify-content: center;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
<button class="menu-btn" id="menuBtn">☰</button>
<div id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ========== ПЕРЕМЕННЫЕ ==========
    let token = localStorage.getItem('token');
    let deviceId = localStorage.getItem('deviceId');
    let currentUser = null;
    let socket = null;
    let messages = [];
    let users = [];
    let chats = [];
    let currentChat = null;

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function getDeviceId() {
        if (!deviceId) {
            deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 16);
            localStorage.setItem('deviceId', deviceId);
        }
        return deviceId;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ========== АВТОРИЗАЦИЯ ==========
    async function checkAuth() {
        if (!token) { showLogin(); return; }
        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            if (response.ok) {
                const data = await response.json();
                currentUser = data.user;
                await loadData();
                connectWebSocket();
                showMainApp();
            } else {
                localStorage.removeItem('token');
                showLogin();
            }
        } catch(e) { showLogin(); }
    }

    async function loadData() {
        try {
            const [usersRes, chatsRes] = await Promise.all([
                fetch('/api/users'),
                fetch('/api/chats?userId=' + currentUser.id)
            ]);
            users = await usersRes.json();
            chats = await chatsRes.json();
        } catch(e) {
            console.error('Ошибка загрузки:', e);
        }
    }

    function showLogin() {
        document.getElementById('app').innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#f0f2f5;">
                <div class="login-screen">
                    <h1>📱 Vanogram</h1>
                    <p>Введите номер телефона</p>
                    <input type="tel" id="phone" placeholder="+7 XXX XXX XX XX" value="+7">
                    <input type="text" id="name" placeholder="Ваше имя">
                    <button id="loginBtn">Войти</button>
                    <div class="error" id="errorMsg"></div>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const name = document.getElementById('name').value.trim();
            if (!phone || phone.length < 10) {
                document.getElementById('errorMsg').textContent = 'Введите корректный номер';
                return;
            }
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, name, deviceId: getDeviceId() })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    token = data.token;
                    currentUser = data.user;
                    await loadData();
                    connectWebSocket();
                    showMainApp();
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'Ошибка';
                }
            } catch(e) {
                document.getElementById('errorMsg').textContent = 'Ошибка соединения';
            }
        };
    }

    // ========== WEBSOCKET ==========
    function connectWebSocket() {
        socket = io();
        socket.on('connect', () => {
            console.log('WebSocket подключен');
            socket.emit('auth', currentUser.id);
        });
        socket.on('chat history', (history) => {
            messages = history;
            if (currentChat) renderMessages();
        });
        socket.on('new message', (message) => {
            messages.push(message);
            if (currentChat && message.chatId === currentChat.id) renderMessages();
            updateChatsList();
        });
        socket.on('users list', (updatedUsers) => {
            users = updatedUsers;
            updateChatsList();
        });
        socket.on('users online', (onlineIds) => {
            for (let user of users) user.online = onlineIds.includes(user.id);
            updateChatsList();
            updateChatHeader();
        });
    }

    // ========== ОТОБРАЖЕНИЕ ==========
    function showMainApp() {
        renderMainApp();
        updateChatsList();
    }

    function renderMainApp() {
        document.getElementById('app').innerHTML = `
            <div class="app">
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <div class="user-card" id="profileBtn">
                            <img src="${currentUser.avatar}" class="user-avatar">
                            <div class="user-info">
                                <div class="user-name">${escapeHtml(currentUser.name)}</div>
                                <div class="user-status" id="userStatus"></div>
                            </div>
                        </div>
                    </div>
                    <div class="search-box">
                        <input type="text" class="search-input" id="searchInput" placeholder="Поиск">
                    </div>
                    <div class="chats-list" id="chatsList"></div>
                </div>
                <div class="main-chat">
                    <div class="chat-header" id="chatHeader" style="display: none;">
                        <img src="" id="chatAvatar" class="chat-header-avatar">
                        <div class="chat-header-info">
                            <div class="chat-header-name" id="chatName"></div>
                            <div class="chat-header-status" id="chatStatus"></div>
                        </div>
                    </div>
                    <div class="messages-area" id="messagesArea"></div>
                    <div class="input-area" id="inputArea" style="display: none;">
                        <div class="input-wrapper">
                            <button class="icon-btn" id="photoBtn">📷</button>
                            <input type="text" id="messageInput" placeholder="Сообщение...">
                        </div>
                        <button id="sendBtn">📤</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('profileBtn')?.addEventListener('click', showProfile);
        document.getElementById('photoBtn')?.addEventListener('click', selectPhoto);
        
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        
        if (sendBtn) sendBtn.onclick = sendMessage;
        if (messageInput) messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.oninput = (e) => {
                const query = e.target.value.toLowerCase();
                filterChats(query);
            };
        }
        
        const menuBtn = document.getElementById('menuBtn');
        if (menuBtn) {
            menuBtn.onclick = () => {
                document.getElementById('sidebar').classList.toggle('open');
            };
        }
        
        const userStatus = document.getElementById('userStatus');
        if (userStatus) userStatus.innerHTML = '<span class="online-dot"></span> Онлайн';
    }

    function filterChats(query) {
        const container = document.getElementById('chatsList');
        if (!container) return;
        const items = container.querySelectorAll('.chat-item');
        items.forEach(item => {
            const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
            if (name.includes(query)) {
                item.style.display = 'flex';
            } else {
                item.style.display = 'none';
            }
        });
    }

    function updateChatsList() {
        const container = document.getElementById('chatsList');
        if (!container) return;
        
        const otherUsers = users.filter(u => u.id !== currentUser?.id);
        
        if (otherUsers.length === 0) {
            container.innerHTML = '<div style="padding:20px;color:#65676b;text-align:center;">Нет других пользователей</div>';
            return;
        }
        
        container.innerHTML = '';
        
        for (const user of otherUsers) {
            const div = document.createElement('div');
            div.className = `chat-item ${currentChat?.id === user.id ? 'active' : ''}`;
            div.innerHTML = `
                <img src="${user.avatar}" class="chat-avatar">
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(user.name)}</div>
                    <div class="chat-last-msg">${user.online ? 'Онлайн' : user.phone}</div>
                </div>
            `;
            div.onclick = () => {
                const chat = { id: user.id, name: user.name, avatar: user.avatar, members: [currentUser.id, user.id] };
                selectChat(chat);
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            };
            container.appendChild(div);
        }
    }

    function selectChat(chat) {
        currentChat = chat;
        
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('inputArea').style.display = 'flex';
        
        document.getElementById('chatAvatar').src = chat.avatar;
        document.getElementById('chatName').textContent = chat.name;
        
        const otherUser = users.find(u => u.id === chat.id);
        if (otherUser) {
            document.getElementById('chatStatus').innerHTML = otherUser.online ? '<span class="online-dot"></span> Онлайн' : 'Не в сети';
        }
        
        renderMessages();
    }

    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if (!container || !currentChat) return;
        
        const chatMessages = messages.filter(m => m.chatId === currentChat.id);
        container.innerHTML = '';
        
        for (const msg of chatMessages) {
            const isSent = msg.userId === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            
            let content = '';
            if (msg.image) {
                content = `<img src="${msg.image}" class="message-image" onclick="window.open(this.src)">`;
            } else {
                content = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
            }
            
            div.innerHTML = `
                ${!isSent ? `<div class="message-name">${escapeHtml(msg.userName)}</div>` : ''}
                ${content}
                <div class="message-info">${formatTime(msg.timestamp)}</div>
            `;
            container.appendChild(div);
        }
        
        container.scrollTop = container.scrollHeight;
    }

    function updateChatHeader() {
        if (currentChat) {
            const otherUser = users.find(u => u.id === currentChat.id);
            if (otherUser) {
                const statusEl = document.getElementById('chatStatus');
                if (statusEl) {
                    statusEl.innerHTML = otherUser.online ? '<span class="online-dot"></span> Онлайн' : 'Не в сети';
                }
            }
        }
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChat) return;
        
        socket.emit('send message', { chatId: currentChat.id, text: text });
        input.value = '';
    }

    // ========== ОТПРАВКА ФОТО ==========
    function selectPhoto() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // Показываем превью и отправляем
            const reader = new FileReader();
            reader.onload = (event) => {
                const imageData = event.target.result;
                // Добавляем сообщение сразу в UI
                const message = {
                    id: Date.now().toString(),
                    chatId: currentChat.id,
                    userId: currentUser.id,
                    userName: currentUser.name,
                    userAvatar: currentUser.avatar,
                    text: '📷 Фото',
                    image: imageData,
                    timestamp: Date.now()
                };
                messages.push(message);
                renderMessages();
                
                // Отправляем на сервер
                socket.emit('send message', { 
                    chatId: currentChat.id, 
                    text: '📷 Фото', 
                    image: imageData 
                });
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    function showProfile() {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:2000;';
        modal.innerHTML = `
            <div style="background:white;border-radius:24px;padding:32px;width:90%;max-width:380px;text-align:center;">
                <img src="${currentUser.avatar}" style="width:100px;height:100px;border-radius:50%;margin-bottom:16px;">
                <div style="font-size:24px;font-weight:600;margin-bottom:8px;">${escapeHtml(currentUser.name)}</div>
                <div style="color:#65676b;margin-bottom:24px;">${escapeHtml(currentUser.phone)}</div>
                <button id="logoutBtn" style="background:#e53935;color:white;border:none;padding:12px;border-radius:12px;width:100%;cursor:pointer;">Выйти</button>
                <button id="closeModal" style="margin-top:12px;background:#f0f2f5;border:none;padding:12px;border-radius:12px;width:100%;cursor:pointer;">Отмена</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('token');
            localStorage.removeItem('deviceId');
            if (socket) socket.disconnect();
            location.reload();
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }

    // Запуск
    checkAuth();
</script>
</body>
</html>
