<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#075e54">
    <title>✨ Мессенджер | Чат с друзьями</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0e1621;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Основной контейнер */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Боковая панель */
        .sidebar {
            width: 280px;
            background: #17212b;
            border-right: 1px solid #242f3d;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar.open {
                transform: translateX(0);
                box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            }
        }

        /* Кнопка меню для телефона */
        .menu-btn {
            display: none;
            position: fixed;
            left: 12px;
            top: 12px;
            z-index: 1001;
            background: #2b5278;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        /* Шапка боковой панели */
        .sidebar-header {
            padding: 20px 16px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2aab6e, #1c8a5a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .user-status {
            font-size: 12px;
            color: #6c7883;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #2aab6e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        /* Кнопки */
        .new-chat-btn, .new-group-btn, .join-group-btn {
            width: 100%;
            padding: 12px;
            background: #2b5278;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 8px;
            transition: opacity 0.2s;
        }

        .new-group-btn {
            background: #2aab6e;
        }

        .join-group-btn {
            background: #242f3d;
        }

        .new-chat-btn:active, .new-group-btn:active, .join-group-btn:active {
            opacity: 0.7;
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .chat-item {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #242f3d;
        }

        .chat-item:active {
            background: #1e2a36;
        }

        .chat-item.active {
            background: #2b5278;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: #2b5278;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            color: white;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-last-msg {
            color: #6c7883;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 10px;
            color: #6c7883;
        }

        .unread-badge {
            background: #2aab6e;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
        }

        /* Основная область чата */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0e1621;
            width: 100%;
        }

        .chat-header {
            padding: 12px 16px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            background: #2b5278;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .chat-header-name {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header-status {
            font-size: 11px;
            color: #6c7883;
        }

        .invite-code {
            background: #242f3d;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #2aab6e;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }

        .message-sent {
            align-self: flex-end;
        }

        .message-received {
            align-self: flex-start;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message-sent .bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-received .bubble {
            background: #17212b;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .system-message {
            align-self: center;
            max-width: 90%;
        }

        .system-message .bubble {
            background: #242f3d;
            color: #6c7883;
            text-align: center;
            font-size: 11px;
        }

        .message-name {
            font-size: 11px;
            color: #2aab6e;
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 9px;
            color: #6c7883;
            margin-top: 4px;
        }

        .message-sent .message-time {
            text-align: right;
        }

        /* Индикатор печатания */
        .typing-indicator {
            padding: 5px 16px;
            font-size: 11px;
            color: #6c7883;
            font-style: italic;
        }

        /* Ввод сообщения */
        .input-area {
            padding: 12px 16px;
            background: #17212b;
            display: flex;
            gap: 8px;
            border-top: 1px solid #242f3d;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            background: #242f3d;
            border-radius: 25px;
            padding: 5px 12px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }

        #messageInput::placeholder {
            color: #6c7883;
        }

        .emoji-btn {
            background: transparent;
            border: none;
            color: #6c7883;
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
        }

        #sendBtn {
            background: #2b5278;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: #17212b;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
        }

        .modal-content h3 {
            color: white;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            background: #242f3d;
            border: none;
            border-radius: 10px;
            color: white;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #2b5278;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .users-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-item:active {
            background: #242f3d;
        }

        .close-modal {
            background: #6c7883 !important;
        }

        .hidden {
            display: none;
        }

        /* Эмодзи панель */
        .emoji-panel {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #17212b;
            border-radius: 20px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            z-index: 1000;
            border: 1px solid #242f3d;
            width: 280px;
        }

        .emoji-panel span {
            font-size: 28px;
            cursor: pointer;
            padding: 5px;
            text-align: center;
        }

        .emoji-panel span:active {
            background: #242f3d;
            border-radius: 10px;
        }

        /* Экран входа */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0e1621;
            padding: 20px;
        }

        .login-box {
            background: #17212b;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            width: 100%;
            max-width: 320px;
        }

        .login-box h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-box p {
            color: #6c7883;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            background: #242f3d;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
            text-align: center;
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: #2aab6e;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div id="app"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let currentUser = null;
        let currentChat = null;
        let chats = [];
        let onlineUsers = [];
        let typingTimeout;
        let emojiPanel = null;

        const emojis = ['😀', '😂', '😍', '🥰', '😎', '🤔', '😢', '🔥', '👍', '❤️', '🎉', '✨', '⭐', '💬', '👋', '🙏'];

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            if (sidebar) {
                sidebar.classList.toggle('open');
            }
        }

        function closeSidebar() {
            const sidebar = document.querySelector('.sidebar');
            if (sidebar && window.innerWidth <= 768) {
                sidebar.classList.remove('open');
            }
        }

        function showLogin() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <div style="font-size: 50px; margin-bottom: 15px;">✨</div>
                        <h1>Мессенджер</h1>
                        <p>Чат с друзьями в реальном времени</p>
                        <input type="text" id="username" placeholder="Ваше имя" autocomplete="off">
                        <button id="loginBtn">Войти</button>
                    </div>
                </div>
            `;
            
            document.getElementById('loginBtn').onclick = () => {
                const name = document.getElementById('username').value.trim();
                if (!name) {
                    alert('Введите ваше имя');
                    return;
                }
                
                socket = io();
                currentUser = { name: name };
                
                socket.on('connect', () => {
                    socket.emit('register', { name: currentUser.name });
                    setupSocketEvents();
                });
            };
            
            document.getElementById('username').onkeypress = (e) => {
                if (e.key === 'Enter') document.getElementById('loginBtn').click();
            };
        }

        function setupSocketEvents() {
            socket.on('users list', (users) => {
                onlineUsers = users;
                updateOnlineStatus();
            });
            
            socket.on('chats list', (chatsList) => {
                chats = chatsList;
                renderChatsList();
            });
            
            socket.on('chat created', (chat) => {
                chats.unshift(chat);
                renderChatsList();
            });
            
            socket.on('new chat', (chat) => {
                chats.unshift(chat);
                renderChatsList();
            });
            
            socket.on('new message', (data) => {
                const chat = chats.find(c => c.id === data.chatId);
                if (chat) {
                    chat.lastMessage = data.message.text;
                    chat.lastMessageTime = data.message.time;
                    if (currentChat?.id === data.chatId) {
                        renderMessages();
                    }
                    renderChatsList();
                }
            });
            
            socket.on('message sent', (data) => {
                if (currentChat?.id === data.chatId) {
                    renderMessages();
                }
            });
            
            socket.on('chat history', (data) => {
                if (currentChat?.id === data.chatId) {
                    renderMessagesWithHistory(data.messages);
                }
            });
            
            socket.on('user typing', (data) => {
                if (currentChat?.id === data.chatId) {
                    const indicator = document.getElementById('typingIndicator');
                    if (indicator) {
                        if (data.isTyping) {
                            indicator.textContent = `✏️ ${escapeHtml(data.userName)} печатает...`;
                            indicator.classList.remove('hidden');
                        } else {
                            indicator.classList.add('hidden');
                        }
                    }
                }
            });
            
            socket.on('group joined', (group) => {
                chats.unshift(group);
                renderChatsList();
            });
            
            socket.on('error', (msg) => {
                alert(msg);
            });
            
            renderMainChat();
        }

        function renderMainChat() {
            document.getElementById('app').innerHTML = `
                <div class="app">
                    <div class="sidebar" id="sidebar">
                        <div class="sidebar-header">
                            <div class="user-card">
                                <div class="avatar">${getAvatarEmoji(currentUser?.name || '?')}</div>
                                <div class="user-info">
                                    <div class="user-name">${escapeHtml(currentUser?.name || '')}</div>
                                    <div class="user-status" id="onlineStatus"><span class="online-dot"></span> Загрузка...</div>
                                </div>
                            </div>
                            <button class="new-chat-btn" onclick="showNewChatModal()">➕ Новый чат</button>
                            <button class="new-group-btn" onclick="showNewGroupModal()">👥 Создать группу</button>
                            <button class="join-group-btn" onclick="showJoinGroupModal()">🔗 Войти по коду</button>
                        </div>
                        <div class="chats-list" id="chatsList"></div>
                    </div>
                    <div class="main-chat">
                        <div class="chat-header" id="chatHeader">
                            <div class="chat-header-info">
                                <div class="chat-header-avatar">💬</div>
                                <div>
                                    <div class="chat-header-name">Выберите чат</div>
                                    <div class="chat-header-status"></div>
                                </div>
                            </div>
                        </div>
                        <div class="messages-area" id="messagesArea"></div>
                        <div class="typing-indicator hidden" id="typingIndicator"></div>
                        <div class="input-area" id="inputArea" style="display: none;">
                            <div class="input-wrapper">
                                <button class="emoji-btn" onclick="toggleEmojiPanel()">😊</button>
                                <input type="text" id="messageInput" placeholder="Сообщение...">
                            </div>
                            <button id="sendBtn">📤</button>
                        </div>
                    </div>
                </div>
            `;
            
            renderChatsList();
            
            if (currentChat) {
                const headerAvatar = currentChat.type === 'group' ? (currentChat.avatar || '👥') : (currentChat.avatar || '💬');
                document.querySelector('.chat-header-avatar').textContent = headerAvatar;
                document.querySelector('.chat-header-name').textContent = currentChat.name;
                
                if (currentChat.type === 'group' && currentChat.inviteCode) {
                    const inviteSpan = document.createElement('span');
                    inviteSpan.className = 'invite-code';
                    inviteSpan.textContent = `🔗 ${currentChat.inviteCode}`;
                    inviteSpan.onclick = (e) => {
                        e.stopPropagation();
                        navigator.clipboard.writeText(currentChat.inviteCode);
                        alert('✅ Код скопирован!');
                    };
                    document.querySelector('.chat-header').appendChild(inviteSpan);
                }
                
                document.getElementById('inputArea').style.display = 'flex';
                socket.emit('get chat history', currentChat.id);
                
                const sendBtn = document.getElementById('sendBtn');
                const input = document.getElementById('messageInput');
                
                sendBtn.onclick = () => sendMessage();
                input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
                
                let typingTimer;
                input.oninput = () => {
                    socket.emit('typing', { chatId: currentChat.id, isTyping: true });
                    clearTimeout(typingTimer);
                    typingTimer = setTimeout(() => {
                        socket.emit('typing', { chatId: currentChat.id, isTyping: false });
                    }, 1000);
                };
            }
        }

        function renderChatsList() {
            const container = document.getElementById('chatsList');
            if (!container) return;
            
            container.innerHTML = '';
            
            if (chats.length === 0) {
                container.innerHTML = '<div style="color: #6c7883; text-align: center; padding: 40px;">Нет чатов<br>Создайте новый</div>';
                return;
            }
            
            for (const chat of chats) {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChat?.id === chat.id ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="chat-avatar">${chat.avatar || (chat.type === 'group' ? '👥' : '💬')}</div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${escapeHtml(chat.name)}
                            ${chat.unread ? `<span class="unread-badge">${chat.unread}</span>` : ''}
                        </div>
                        <div class="chat-last-msg">${escapeHtml(chat.lastMessage ? chat.lastMessage.substring(0, 35) : 'Нет сообщений')}</div>
                    </div>
                    <div class="chat-time">${chat.lastMessageTime ? formatTime(chat.lastMessageTime) : ''}</div>
                `;
                div.onclick = () => {
                    currentChat = chat;
                    renderMainChat();
                    closeSidebar();
                };
                container.appendChild(div);
            }
        }

        function renderMessagesWithHistory(messages) {
            const container = document.getElementById('messagesArea');
            if (!container) return;
            
            container.innerHTML = '';
            
            for (const msg of messages) {
                addMessageToContainer(msg);
            }
            
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }

        function renderMessages() {
            socket.emit('get chat history', currentChat.id);
        }

        function addMessageToContainer(msg) {
            const container = document.getElementById('messagesArea');
            if (!container) return;
            
            const isSent = msg.from === socket.id;
            const isSystem = msg.isSystem;
            
            const div = document.createElement('div');
            div.className = `message ${isSystem ? 'system-message' : (isSent ? 'message-sent' : 'message-received')}`;
            
            if (isSystem) {
                div.innerHTML = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
            } else {
                div.innerHTML = `
                    ${!isSent ? `<div class="message-name">${escapeHtml(msg.fromName)}</div>` : ''}
                    <div class="bubble">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${formatTime(msg.time)}</div>
                `;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChat) return;
            
            socket.emit('send message', {
                chatId: currentChat.id,
                text: text
            });
            
            socket.emit('typing', { chatId: currentChat.id, isTyping: false });
            input.value = '';
        }

        function updateOnlineStatus() {
            const count = onlineUsers.length;
            const statusDiv = document.getElementById('onlineStatus');
            if (statusDiv) {
                statusDiv.innerHTML = `<span class="online-dot"></span> ${count} ${getWord(count, 'человек', 'человека', 'человек')} онлайн`;
            }
        }

        function getAvatarEmoji(name) {
            if (!name) return '👤';
            const firstChar = name.charAt(0).toUpperCase();
            if (firstChar >= 'A' && firstChar <= 'Z') return firstChar;
            return '👤';
        }

        function getWord(n, one, two, five) {
            n = Math.abs(n) % 100;
            if (n >= 5 && n <= 20) return five;
            n %= 10;
            if (n === 1) return one;
            if (n >= 2 && n <= 4) return two;
            return five;
        }

        function toggleEmojiPanel() {
            if (emojiPanel) {
                emojiPanel.remove();
                emojiPanel = null;
                return;
            }
            
            emojiPanel = document.createElement('div');
            emojiPanel.className = 'emoji-panel';
            for (const emoji of emojis) {
                const span = document.createElement('span');
                span.textContent = emoji;
                span.onclick = () => {
                    const input = document.getElementById('messageInput');
                    if (input) {
                        input.value += emoji;
                        input.focus();
                    }
                    emojiPanel.remove();
                    emojiPanel = null;
                };
                emojiPanel.appendChild(span);
            }
            document.body.appendChild(emojiPanel);
        }

        // Модальные окна
        window.showNewChatModal = function() {
            closeSidebar();
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>➕ Новый чат</h3>
                    <div class="users-list" id="usersList"></div>
                    <button class="close-modal" onclick="this.closest('.modal').remove()">Отмена</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';
            
            const otherUsers = onlineUsers.filter(u => u.id !== socket.id);
            if (otherUsers.length === 0) {
                usersList.innerHTML = '<div style="color: #6c7883; padding: 20px; text-align: center;">Нет других пользователей онлайн</div>';
            } else {
                for (const user of otherUsers) {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `<div style="width: 32px; height: 32px; background: #2b5278; border-radius: 50%; display: flex; align-items: center; justify-content: center;">${user.avatar || '👤'}</div> ${escapeHtml(user.name)}`;
                    userDiv.onclick = () => {
                        socket.emit('create private chat', user.id);
                        modal.remove();
                    };
                    usersList.appendChild(userDiv);
                }
            }
        };

        window.showNewGroupModal = function() {
            closeSidebar();
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>👥 Создать группу</h3>
                    <input type="text" id="groupName" placeholder="Название группы">
                    <button id="createBtn">Создать</button>
                    <button class="close-modal" onclick="this.closest('.modal').remove()">Отмена</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('createBtn').onclick = () => {
                const name = document.getElementById('groupName').value.trim();
                if (!name) {
                    alert('Введите название группы');
                    return;
                }
                socket.emit('create group', { name: name });
                modal.remove();
            };
        };

        window.showJoinGroupModal = function() {
            closeSidebar();
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>🔗 Войти в группу</h3>
                    <input type="text" id="inviteCode" placeholder="Код приглашения" style="text-transform: uppercase;">
                    <button id="joinBtn">Присоединиться</button>
                    <button class="close-modal" onclick="this.closest('.modal').remove()">Отмена</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('joinBtn').onclick = () => {
                const code = document.getElementById('inviteCode').value.trim().toUpperCase();
                if (!code) {
                    alert('Введите код');
                    return;
                }
                socket.emit('join group', code);
                modal.remove();
            };
        };

        // Закрытие эмодзи панели при клике вне
        document.addEventListener('click', (e) => {
            if (emojiPanel && !e.target.closest('.emoji-panel') && !e.target.closest('.emoji-btn')) {
                emojiPanel.remove();
                emojiPanel = null;
            }
        });

        showLogin();
    </script>
</body>
</html>
