<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vanogram Pro | Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* СВЕТЛАЯ ТЕМА КАК В TELEGRAM */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f0f2f5;
            --bg-header: #ffffff;
            --bg-message-sent: #e4e6eb;
            --bg-message-received: #ffffff;
            --text-primary: #050505;
            --text-secondary: #65676b;
            --border-color: #e4e6eb;
            --accent-color: #3390ec;
            --accent-hover: #2a7bc8;
            --online-color: #31a24c;
            --error-color: #e53935;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-secondary);
            height: 100vh;
            overflow: hidden;
        }

        /* Основной контейнер */
        .app {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Боковая панель (список чатов) */
        .sidebar {
            width: 360px;
            background: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 16px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .user-card:hover {
            background: var(--bg-secondary);
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 16px;
        }

        .user-status {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: var(--online-color);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        /* Поиск */
        .search-box {
            padding: 12px 16px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }

        .search-input:focus {
            outline: 2px solid var(--accent-color);
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-item:hover {
            background: var(--bg-secondary);
        }

        .chat-item.active {
            background: #e7f3ff;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-last-msg {
            color: var(--text-secondary);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Основная область чата */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
        }

        .chat-header {
            padding: 12px 20px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header-status {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .call-btn, .group-btn {
            background: var(--accent-color);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: white;
            transition: background 0.2s;
        }

        .call-btn:hover, .group-btn:hover {
            background: var(--accent-hover);
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 65%;
            animation: fadeIn 0.2s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: var(--accent-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: var(--bg-message-received);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .message-info {
            font-size: 11px;
            color: var(--text-secondary);
            margin: 4px 8px 0;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .sent .message-info {
            justify-content: flex-end;
        }

        .message-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
            color: var(--accent-color);
        }

        /* Индикатор печатания */
        .typing-indicator {
            padding: 8px 20px;
            font-size: 13px;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Ввод сообщения */
        .input-area {
            background: var(--bg-header);
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 12px;
            background: var(--bg-secondary);
            border-radius: 28px;
            padding: 8px 16px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-secondary);
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: var(--border-color);
        }

        #messageInput {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        #messageInput::placeholder {
            color: var(--text-secondary);
        }

        #sendBtn {
            background: var(--accent-color);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.1s;
        }

        #sendBtn:active {
            transform: scale(0.95);
        }

        /* Экран звонка */
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .call-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
        }

        .call-name {
            color: white;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .call-status {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .call-controls {
            display: flex;
            gap: 30px;
        }

        .call-control {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .call-control:active {
            transform: scale(0.95);
        }

        .accept-call {
            background: #31a24c;
            color: white;
        }

        .end-call {
            background: #e53935;
            color: white;
        }

        /* Экран входа */
        .login-screen {
            background: var(--bg-primary);
            width: 100%;
            max-width: 420px;
            padding: 48px 32px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .login-screen h1 {
            color: var(--accent-color);
            margin-bottom: 12px;
            font-size: 36px;
        }

        .login-screen p {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .login-screen input {
            width: 100%;
            padding: 16px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 16px;
            font-size: 16px;
            margin-bottom: 16px;
            text-align: center;
            outline: none;
        }

        .login-screen input:focus {
            outline: 2px solid var(--accent-color);
        }

        .login-screen button {
            width: 100%;
            padding: 16px;
            background: var(--accent-color);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-screen button:hover {
            background: var(--accent-hover);
        }

        .error {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 12px;
        }

        .hidden {
            display: none;
        }

        /* Мобильное меню */
        .menu-btn-mobile {
            display: none;
        }

        /* Профиль модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .modal-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 16px;
            object-fit: cover;
        }

        .modal-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .modal-phone {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .modal-btn {
            background: var(--error-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .modal-close {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
        }

        /* Адаптив для телефона */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 85%;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-btn-mobile {
                display: flex;
                position: fixed;
                left: 16px;
                top: 16px;
                z-index: 1001;
                background: var(--accent-color);
                border: none;
                width: 44px;
                height: 44px;
                border-radius: 50%;
                color: white;
                font-size: 20px;
                cursor: pointer;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            }
            .main-chat {
                width: 100%;
            }
            .chat-header {
                padding-left: 70px;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
<button class="menu-btn-mobile" id="menuBtn">☰</button>
<div id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let token = localStorage.getItem('token');
    let deviceId = localStorage.getItem('deviceId');
    let currentUser = null;
    let socket = null;
    let messages = [];
    let users = [];
    let chats = [];
    let currentChat = null;
    let searchQuery = '';
    
    // WebRTC для звонков
    let peerConnection = null;
    let localStream = null;
    let currentCall = null;
    
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTime(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        if (date.toDateString() === now.toDateString()) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        return date.toLocaleDateString();
    }

    function getDeviceId() {
        if (!deviceId) {
            deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 16);
            localStorage.setItem('deviceId', deviceId);
        }
        return deviceId;
    }

    // ========== АВТОРИЗАЦИЯ ==========
    async function checkAuth() {
        if (!token) { showLogin(); return; }
        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            if (response.ok) {
                const data = await response.json();
                currentUser = data.user;
                await loadData();
                connectWebSocket();
                showMainApp();
            } else {
                localStorage.removeItem('token');
                showLogin();
            }
        } catch(e) { showLogin(); }
    }

    async function loadData() {
        try {
            const [usersRes, chatsRes] = await Promise.all([
                fetch('/api/users'),
                fetch('/api/chats?userId=' + currentUser.id)
            ]);
            users = await usersRes.json();
            chats = await chatsRes.json();
        } catch(e) {
            console.error('Ошибка загрузки данных:', e);
        }
    }

    function showLogin() {
        document.getElementById('app').innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:var(--bg-secondary);">
                <div class="login-screen">
                    <h1>📱 Vanogram Pro</h1>
                    <p>Введите номер телефона для входа</p>
                    <input type="tel" id="phone" placeholder="+7 XXX XXX XX XX" value="+7">
                    <input type="text" id="name" placeholder="Ваше имя">
                    <button id="loginBtn">Продолжить</button>
                    <div class="error" id="errorMsg"></div>
                </div>
            </div>
        `;
        
        document.getElementById('loginBtn').onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const name = document.getElementById('name').value.trim();
            if (!phone || phone.length < 10) {
                document.getElementById('errorMsg').textContent = 'Введите корректный номер телефона';
                return;
            }
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, name, deviceId: getDeviceId() })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    token = data.token;
                    currentUser = data.user;
                    await loadData();
                    connectWebSocket();
                    showMainApp();
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'Ошибка регистрации';
                }
            } catch(e) {
                document.getElementById('errorMsg').textContent = 'Ошибка соединения с сервером';
            }
        };
    }

    // ========== WEBSOCKET ==========
    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        
        socket = io(wsUrl, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 10,
            reconnectionDelay: 1000
        });
        
        socket.on('connect', () => {
            console.log('✅ WebSocket подключен');
            socket.emit('auth', currentUser.id);
        });
        
        socket.on('chat history', (history) => {
            messages = history;
            if (currentChat) renderMessages();
        });
        
        socket.on('new message', (message) => {
            messages.push(message);
            if (currentChat && message.chatId === currentChat.id) {
                renderMessages();
            }
            updateChatsList();
        });
        
        socket.on('users list', (updatedUsers) => {
            users = updatedUsers;
            updateChatsList();
        });
        
        socket.on('chats list', (updatedChats) => {
            chats = updatedChats;
            updateChatsList();
        });
        
        socket.on('users online', (onlineIds) => {
            for (let user of users) user.online = onlineIds.includes(user.id);
            updateChatsList();
            updateChatHeader();
        });
        
        socket.on('user typing', (data) => {
            if (currentChat && data.chatId === currentChat.id && data.userId !== currentUser.id) {
                const typingEl = document.getElementById('typingIndicator');
                if (typingEl) {
                    if (data.isTyping) {
                        typingEl.textContent = `✏️ ${data.userName} печатает...`;
                        typingEl.classList.remove('hidden');
                    } else {
                        typingEl.classList.add('hidden');
                    }
                }
            }
        });
        
        // ========== ЗВОНКИ ==========
        socket.on('incoming call', async (data) => {
            showIncomingCall(data);
        });
        
        socket.on('call answered', async (data) => {
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
            updateCallStatus('В разговоре...');
        });
        
        socket.on('ice candidate', async (data) => {
            if (peerConnection) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });
        
        socket.on('call ended', () => {
            endCall();
            alert('Звонок завершён');
        });
        
        socket.on('connect_error', (error) => {
            console.error('WebSocket ошибка:', error);
        });
    }

    // ========== ЗВОНКИ ==========
    async function startCall(targetUserId, targetName) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice candidate', {
                        targetUserId: targetUserId,
                        candidate: event.candidate
                    });
                }
            };
            
            peerConnection.ontrack = (event) => {
                console.log('Получен трек');
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            socket.emit('call user', {
                targetUserId: targetUserId,
                offer: offer
            });
            
            showCallUI(targetName, 'Вызов...');
            currentCall = targetUserId;
            
        } catch (error) {
            console.error('Ошибка звонка:', error);
            alert('Не удалось получить доступ к микрофону. Разрешите доступ в настройках браузера.');
        }
    }
    
    function showIncomingCall(data) {
        const modal = document.createElement('div');
        modal.className = 'call-modal';
        modal.id = 'incomingCallModal';
        modal.innerHTML = `
            <img class="call-avatar" src="https://ui-avatars.com/api/?name=${encodeURIComponent(data.fromName)}&background=3390ec&color=fff">
            <div class="call-name">${escapeHtml(data.fromName)}</div>
            <div class="call-status">Входящий звонок...</div>
            <div class="call-controls">
                <button class="call-control accept-call" id="acceptCall">📞</button>
                <button class="call-control end-call" id="rejectCall">❌</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('acceptCall').onclick = () => acceptCall(data);
        document.getElementById('rejectCall').onclick = () => {
            modal.remove();
            socket.emit('end call', { targetUserId: data.from });
        };
    }
    
    async function acceptCall(data) {
        document.getElementById('incomingCallModal')?.remove();
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice candidate', {
                        targetUserId: data.from,
                        candidate: event.candidate
                    });
                }
            };
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            socket.emit('answer call', {
                targetUserId: data.from,
                answer: answer
            });
            
            showCallUI(data.fromName, 'Соединение...');
            currentCall = data.from;
            
        } catch (error) {
            console.error('Ошибка принятия звонка:', error);
        }
    }
    
    function showCallUI(name, status) {
        const modal = document.createElement('div');
        modal.className = 'call-modal';
        modal.id = 'callModal';
        modal.innerHTML = `
            <div class="call-name">${escapeHtml(name)}</div>
            <div class="call-status" id="callStatus">${status}</div>
            <div class="call-controls">
                <button class="call-control end-call" id="endCallBtn">❌</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('endCallBtn').onclick = () => {
            if (currentCall) {
                socket.emit('end call', { targetUserId: currentCall });
            }
            endCall();
        };
    }
    
    function updateCallStatus(status) {
        const statusEl = document.getElementById('callStatus');
        if (statusEl) statusEl.textContent = status;
    }
    
    function endCall() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        document.getElementById('callModal')?.remove();
        document.getElementById('incomingCallModal')?.remove();
        currentCall = null;
    }

                            <button class="icon-btn" id="emojiBtn">😊</button>
                        </div>
                        <button id="sendBtn">📤</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('profileBtn')?.addEventListener('click', showProfile);
        document.getElementById('groupBtn')?.addEventListener('click', showCreateGroupModal);
        document.getElementById('attachBtn')?.addEventListener('click', selectPhoto);
        document.getElementById('emojiBtn')?.addEventListener('click', toggleEmojiPicker);
        
        const callBtn = document.getElementById('callBtn');
        if (callBtn) {
            callBtn.addEventListener('click', () => {
                if (currentChat && currentChat.type === 'private') {
                    const otherUserId = currentChat.members?.find(id => id !== currentUser.id);
                    const otherUser = users.find(u => u.id === otherUserId);
                    if (otherUser) startCall(otherUserId, otherUser.name);
                } else {
                    alert('Звонки доступны только в личных чатах');
                }
            });
        }
        
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        
        if (sendBtn) sendBtn.onclick = sendMessage;
        if (messageInput) {
            messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
            
            let typingTimeout;
            messageInput.oninput = () => {
                if (currentChat) {
                    socket.emit('typing', { chatId: currentChat.id, isTyping: true });
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => {
                        socket.emit('typing', { chatId: currentChat.id, isTyping: false });
                    }, 1000);
                }
            };
        }
        
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.oninput = (e) => {
                searchQuery = e.target.value.toLowerCase();
                updateChatsList();
            };
        }
        
        const menuBtn = document.getElementById('menuBtn');
        if (menuBtn) {
            menuBtn.onclick = () => {
                document.getElementById('sidebar').classList.toggle('open');
            };
        }
        
        const userStatus = document.getElementById('userStatus');
        if (userStatus) userStatus.innerHTML = '<span class="online-dot"></span> Онлайн';
    }

    function updateChatsList() {
        const container = document.getElementById('chatsList');
        if (!container) return;
        
        let filteredChats = chats.filter(chat => 
            chat.name.toLowerCase().includes(searchQuery)
        );
        
        filteredChats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
        
        container.innerHTML = '';
        
        if (filteredChats.length === 0) {
            container.innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center;">Нет чатов<br><button class="icon-btn" id="newChatBtn" style="margin-top:10px;">➕ Создать чат</button></div>';
            document.getElementById('newChatBtn')?.addEventListener('click', showNewChatModal);
            return;
        }
        
        for (const chat of filteredChats) {
            const div = document.createElement('div');
            div.className = `chat-item ${currentChat?.id === chat.id ? 'active' : ''}`;
            
            let avatar = chat.avatar;
            let name = chat.name;
            
            if (chat.type === 'private') {
                const otherUser = users.find(u => u.id === chat.members?.find(m => m !== currentUser.id));
                if (otherUser) {
                    avatar = otherUser.avatar;
                    name = otherUser.name;
                }
            }
            
            div.innerHTML = `
                <div class="chat-avatar">${avatar.includes('http') ? `<img src="${avatar}">` : avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">
                        ${escapeHtml(name)}
                        <div class="chat-time">${chat.lastMessageTime ? formatTime(chat.lastMessageTime) : ''}</div>
                    </div>
                    <div class="chat-last-msg">${escapeHtml(chat.lastMessage?.substring(0, 40) || 'Нет сообщений')}</div>
                </div>
            `;
            div.onclick = () => selectChat(chat);
            container.appendChild(div);
        }
    }
