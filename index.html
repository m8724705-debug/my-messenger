<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vanogram | Мессенджер с медиа</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 700px;
            background: #17212b;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-info {
            flex: 1;
        }

        .header-info h2 {
            font-size: 18px;
            margin-bottom: 2px;
        }

        .header-info p {
            font-size: 12px;
            opacity: 0.8;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: #242f3d;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .message-audio {
            background: #2b5278;
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .audio-play {
            background: #25d366;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
        }

        .message-info {
            font-size: 10px;
            color: #6c7883;
            margin: 3px 8px 0;
            display: flex;
            gap: 8px;
        }

        .sent .message-info {
            justify-content: flex-end;
        }

        .message-name {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 4px;
            color: #2aab6e;
        }

        .input-area {
            background: #17212b;
            padding: 12px 15px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #242f3d;
            flex-wrap: wrap;
        }

        .input-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: #242f3d;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: white;
        }

        .input-row {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 15px;
            background: #242f3d;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #sendBtn {
            background: #2b5278;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        /* Экран входа */
        .login-screen {
            background: #17212b;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
        }

        .login-screen h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .login-screen p {
            color: #6c7883;
            margin-bottom: 30px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            background: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            color: #3c4043;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 10px;
            background: #242f3d;
            border-radius: 12px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-details {
            flex: 1;
            text-align: left;
        }

        .user-details .name {
            color: white;
            font-weight: 600;
        }

        .user-details .email {
            color: #6c7883;
            font-size: 12px;
        }

        .logout-btn {
            background: #6c7883;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        .error {
            color: #ff6666;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Модальное окно для просмотра фото */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="app"></div>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyCBFv9Ls7CckQnHfxFQRLNr8aqjgKbPcVw",
        authDomain: "vanogram-web.firebaseapp.com",
        projectId: "vanogram-web",
        storageBucket: "vanogram-web.firebasestorage.app",
        messagingSenderId: "903317318632",
        appId: "1:903317318632:web:102eb598260c61b86b125d",
        measurementId: "G-EM1QGH39X2"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    
    let socket = null;
    let currentUser = null;
    let messages = [];
    let audioElements = {};
    
    const SERVER_URL = "https://my-messenger-oura.onrender.com";
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // === ФУНКЦИИ ДЛЯ МЕДИА ===
    function compressImage(file, maxWidth, callback) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                callback(dataUrl);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
    
    function sendPhoto(file) {
        compressImage(file, 800, (dataUrl) => {
            socket.emit('send message', { text: '[Фото]', image: dataUrl });
        });
    }
    
    function sendAudio(blob) {
        const reader = new FileReader();
        reader.onload = function() {
            socket.emit('send message', { text: '[Аудио]', audio: reader.result });
        };
        reader.readAsDataURL(blob);
    }
    
    function startRecording() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                const mediaRecorder = new MediaRecorder(stream);
                let chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    sendAudio(blob);
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 5000);
            });
    }
    
    function makeCall() {
        if (confirm('Видеозвонок пока в разработке. Открыть Google Meet?')) {
            window.open('https://meet.google.com/new', '_blank');
        }
    }
    
    // === ЭКРАН ВХОДА ===
    function showLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-screen">
                <h1>📱 Vanogram</h1>
                <p>Войдите в мессенджер</p>
                <button class="google-btn" id="googleBtn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    Войти через Google
                </button>
                <div class="error" id="errorMsg"></div>
            </div>
        `;
        document.getElementById('googleBtn').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message;
            }
        };
    }
    
    // === ПРОФИЛЬ ===
    function showProfile(user) {
        document.getElementById('app').innerHTML = `
            <div class="login-screen">
                <h1>📱 Vanogram</h1>
                <div class="user-info">
                    <img src="${user.photoURL || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" class="user-avatar">
                    <div class="user-details">
                        <div class="name">${escapeHtml(user.displayName || user.email)}</div>
                        <div class="email">${escapeHtml(user.email)}</div>
                    </div>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                </div>
                <button class="google-btn" id="enterChatBtn" style="background: #2aab6e; color: white;">Войти в чат</button>
            </div>
        `;
        document.getElementById('enterChatBtn').onclick = () => startChat(user.displayName || user.email.split('@')[0]);
        document.getElementById('logoutBtn').onclick = async () => await signOut(auth);
    }
    
    // === ОСНОВНОЙ ЧАТ ===
    function startChat(userName) {
        socket = io(SERVER_URL);
        
        socket.on('connect', () => socket.emit('user join', userName));
        socket.on('chat history', (history) => { messages = history; renderMessages(); });
        socket.on('new message', (message) => { messages.push(message); renderMessages(); });
        socket.on('users list', (users) => {
            const onlineEl = document.getElementById('onlineCount');
            if (onlineEl) onlineEl.innerHTML = `${users.length} онлайн`;
        });
        
        renderChatUI(userName);
    }
    
    function renderChatUI(userName) {
        document.getElementById('app').innerHTML = `
            <div class="chat-container">
                <div class="chat-header">
                    <div class="avatar">👤</div>
                    <div class="header-info">
                        <h2>${escapeHtml(userName)}</h2>
                        <p id="onlineCount">Подключение...</p>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="input-area">
                    <div class="input-buttons">
                        <button class="icon-btn" id="photoBtn">📷</button>
                        <button class="icon-btn" id="audioBtn">🎤</button>
                        <button class="icon-btn" id="callBtn">📞</button>
                    </div>
                    <div class="input-row">
                        <input type="text" id="messageInput" placeholder="Введите сообщение...">
                        <button id="sendBtn">📤</button>
                    </div>
                </div>
            </div>
        `;
        
        // Скрытые инпуты
        const photoInput = document.createElement('input');
        photoInput.type = 'file';
        photoInput.accept = 'image/*';
        photoInput.onchange = (e) => { if (e.target.files[0]) sendPhoto(e.target.files[0]); };
        
        document.getElementById('photoBtn').onclick = () => photoInput.click();
        document.getElementById('audioBtn').onclick = () => startRecording();
        document.getElementById('callBtn').onclick = () => makeCall();
        
        renderMessages();
        
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const sendMessage = () => {
            const text = input.value.trim();
            if (text) socket.emit('send message', { text: text });
            input.value = '';
        };
        sendBtn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    }
    
    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if (!container) return;
        container.innerHTML = '';
        
        for (const msg of messages) {
            const isSent = msg.userId === socket?.id;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            
            let content = '';
            if (msg.image) {
                content = `<img src="${msg.image}" class="message-image" onclick="window.open(this.src)">`;
            } else if (msg.audio) {
                content = `
                    <div class="message-audio">
                        <button class="audio-play" onclick="this.nextSibling.play()">▶</button>
                        <audio style="display:none"><source src="${msg.audio}" type="audio/webm"></audio>
                        <span>🎤 Голосовое сообщение</span>
                    </div>
                `;
            } else {
                content = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
            }
            
            div.innerHTML = `
                ${!isSent && !msg.image ? `<div class="message-name">${escapeHtml(msg.userName)}</div>` : ''}
                ${content}
                <div class="message-info">${formatTime()}</div>
            `;
            container.appendChild(div);
        }
        container.scrollTop = container.scrollHeight;
    }
    
    // === АВТОРИЗАЦИЯ ===
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            showProfile(user);
        } else {
            if (socket) socket.disconnect();
            showLogin();
        }
    });
</script>
</body>
</html>
