<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vanogram | Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-screen {
            background: #17212b;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
        }
        .login-screen h1 { color: white; margin-bottom: 10px; font-size: 32px; }
        .login-screen p { color: #6c7883; margin-bottom: 30px; }
        .login-screen input {
            width: 100%;
            padding: 15px;
            background: #242f3d;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }
        .login-screen button {
            width: 100%;
            padding: 15px;
            background: #2aab6e;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .error { color: #ff6666; font-size: 12px; margin-top: 10px; }
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #17212b;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 18px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 15px;
        }
        .sent {
            background: #2b5278;
            color: white;
            align-self: flex-end;
        }
        .received {
            background: #242f3d;
            color: white;
            align-self: flex-start;
        }
        .input-area {
            display: flex;
            padding: 12px;
            gap: 10px;
            background: #17212b;
            border-top: 1px solid #242f3d;
        }
        input {
            flex: 1;
            padding: 12px;
            background: #242f3d;
            border: none;
            border-radius: 25px;
            color: white;
            outline: none;
        }
        button {
            background: #2b5278;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        .contacts-list {
            background: #17212b;
            border-right: 1px solid #242f3d;
            width: 300px;
            overflow-y: auto;
        }
        .contact-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #242f3d;
        }
        .contact-item:hover { background: #1e2a36; }
        .contact-name { color: white; font-weight: 600; }
        .contact-status { font-size: 11px; color: #6c7883; }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #2aab6e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .app { display: flex; height: 100vh; width: 100%; }
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            padding: 15px 20px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
        }
        .chat-header-name { color: white; font-size: 18px; font-weight: 600; }
        .message-name { font-size: 11px; color: #2aab6e; margin-bottom: 3px; }
        .message-info { font-size: 10px; color: #6c7883; margin-top: 3px; }
        .sent .message-info { text-align: right; }
    </style>
</head>
<body>
<div id="app"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
    let token = localStorage.getItem('token');
    let currentUser = null;
    let socket = null;
    let messages = [];
    let users = [];
    let currentChatUser = null;

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    async function checkAuth() {
        if (!token) { showLogin(); return; }
        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            if (response.ok) {
                const data = await response.json();
                currentUser = data.user;
                await loadUsers();
                connectWebSocket();
                showMainApp();
            } else {
                localStorage.removeItem('token');
                showLogin();
            }
        } catch(e) { showLogin(); }
    }

    async function loadUsers() {
        const response = await fetch('/api/users');
        users = await response.json();
    }

    function showLogin() {
        document.getElementById('app').innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0e1621;">
                <div class="login-screen">
                    <h1>📱 Vanogram</h1>
                    <p>Введите номер телефона</p>
                    <input type="tel" id="phone" placeholder="+7 XXX XXX XX XX" value="+7">
                    <input type="text" id="name" placeholder="Ваше имя (необязательно)">
                    <button id="loginBtn">Войти / Зарегистрироваться</button>
                    <div class="error" id="errorMsg"></div>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const name = document.getElementById('name').value.trim();
            if (!phone || phone.length < 10) {
                document.getElementById('errorMsg').textContent = 'Введите корректный номер';
                return;
            }
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, name })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    token = data.token;
                    currentUser = data.user;
                    await loadUsers();
                    connectWebSocket();
                    showMainApp();
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'Ошибка';
                }
            } catch(e) {
                document.getElementById('errorMsg').textContent = 'Ошибка соединения';
            }
        };
    }

    function connectWebSocket() {
        socket = io();
        socket.on('connect', () => socket.emit('auth', currentUser.id));
        socket.on('chat history', (history) => { messages = history; if (currentChatUser) renderMessages(); });
        socket.on('new message', (message) => {
            messages.push(message);
            if (currentChatUser) renderMessages();
        });
        socket.on('users list', (updatedUsers) => {
            users = updatedUsers;
            renderContactsList();
        });
        socket.on('users online', (onlineIds) => {
            for (let user of users) user.online = onlineIds.includes(user.id);
            renderContactsList();
        });
    }

    function showMainApp() {
        renderMainApp();
        renderContactsList();
    }

    function renderMainApp() {
        document.getElementById('app').innerHTML = `
            <div class="app">
                <div class="contacts-list" id="contactsList">
                    <div style="padding:20px;color:#6c7883;text-align:center;">Загрузка...</div>
                </div>
                <div class="main-chat">
                    <div class="chat-header">
                        <div class="chat-header-name" id="chatName">Выберите чат</div>
                    </div>
                    <div class="messages" id="messagesArea"></div>
                    <div class="input-area" id="inputArea" style="display:none;">
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <button id="sendBtn">📤</button>
                    </div>
                </div>
            </div>
        `;
        
        const sendBtn = document.getElementById('sendBtn');
        const input = document.getElementById('messageInput');
        if (sendBtn) sendBtn.onclick = sendMessage;
        if (input) input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        
        if (currentChatUser) selectChat(currentChatUser);
    }

    function renderContactsList() {
        const container = document.getElementById('contactsList');
        if (!container) return;
        const otherUsers = users.filter(u => u.id !== currentUser?.id);
        if (otherUsers.length === 0) {
            container.innerHTML = '<div style="padding:20px;color:#6c7883;text-align:center;">Нет других пользователей<br>Поделитесь ссылкой с друзьями!</div>';
            return;
        }
        container.innerHTML = '';
        for (const user of otherUsers) {
            const div = document.createElement('div');
            div.className = `contact-item ${currentChatUser?.id === user.id ? 'active' : ''}`;
            div.innerHTML = `
                <div>
                    <div class="contact-name">${escapeHtml(user.name)}</div>
                    <div class="contact-status">${user.online ? '<span class="online-dot"></span> Онлайн' : user.phone}</div>
                </div>
            `;
            div.onclick = () => selectChat(user);
            container.appendChild(div);
        }
    }

    function selectChat(user) {
        currentChatUser = user;
        document.getElementById('chatName').textContent = user.name;
        document.getElementById('inputArea').style.display = 'flex';
        renderMessages();
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatUser) return;
        socket.emit('send message', { text });
        input.value = '';
    }

    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if (!container) return;
        container.innerHTML = '';
        for (const msg of messages) {
            const isSent = msg.userId === currentUser.id;
            const div = document.createElement('div');
            div.className = `msg ${isSent ? 'sent' : 'received'}`;
            if (!isSent) div.innerHTML = `<div class="message-name">${escapeHtml(msg.userName)}</div>`;
            div.innerHTML += `<div>${escapeHtml(msg.text)}</div><div class="message-info">${formatTime()}</div>`;
            container.appendChild(div);
        }
        container.scrollTop = container.scrollHeight;
    }

    checkAuth();
</script>
</body>
</html>
