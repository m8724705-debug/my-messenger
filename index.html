<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vanogram | Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            height: 100vh;
            overflow: hidden;
        }

        /* Основной контейнер */
        .app {
            display: flex;
            height: 100vh;
        }

        /* Боковая панель (контакты) */
        .sidebar {
            width: 320px;
            background: #17212b;
            border-right: 1px solid #242f3d;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .user-phone {
            color: #6c7883;
            font-size: 12px;
        }

        .online-count {
            font-size: 12px;
            color: #2aab6e;
        }

        /* Список контактов */
        .contacts-title {
            padding: 15px 20px;
            color: #6c7883;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #242f3d;
        }

        .contact-item:hover {
            background: #1e2a36;
        }

        .contact-item.active {
            background: #2b5278;
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            color: white;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .contact-status {
            font-size: 11px;
            color: #6c7883;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #2aab6e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        /* Основная область чата */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0e1621;
        }

        .chat-header {
            padding: 15px 20px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header-status {
            font-size: 11px;
            color: #6c7883;
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: #242f3d;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .message-info {
            font-size: 10px;
            color: #6c7883;
            margin: 3px 8px 0;
        }

        .sent .message-info {
            text-align: right;
        }

        .message-name {
            font-weight: 600;
            font-size: 11px;
            margin-bottom: 4px;
            color: #2aab6e;
        }

        /* Ввод сообщения */
        .input-area {
            background: #17212b;
            padding: 12px 15px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #242f3d;
        }

        .icon-btn {
            background: #242f3d;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: white;
        }

        .input-row {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 15px;
            background: #242f3d;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #sendBtn {
            background: #2b5278;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        /* Экран входа */
        .login-screen {
            background: #17212b;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
        }

        .login-screen h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .login-screen p {
            color: #6c7883;
            margin-bottom: 30px;
        }

        .login-screen input {
            width: 100%;
            padding: 15px;
            background: #242f3d;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }

        .login-screen button {
            width: 100%;
            padding: 15px;
            background: #2aab6e;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            color: #ff6666;
            font-size: 12px;
            margin-top: 10px;
        }

        .typing-indicator {
            padding: 5px 15px;
            font-size: 11px;
            color: #6c7883;
            font-style: italic;
        }

        /* Адаптив для телефона */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-btn {
                display: block;
                position: fixed;
                left: 10px;
                top: 10px;
                z-index: 1001;
                background: #2b5278;
                border: none;
                width: 44px;
                height: 44px;
                border-radius: 50%;
                color: white;
                font-size: 20px;
                cursor: pointer;
            }
        }

        .menu-btn {
            display: none;
        }
    </style>
</head>
<body>
<button class="menu-btn" id="menuBtn">☰</button>
<div id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let token = localStorage.getItem('token');
    let currentUser = null;
    let socket = null;
    let messages = [];
    let users = [];
    let currentChatUser = null;
    
    const SERVER_URL = window.location.origin;
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    async function checkAuth() {
        if (!token) {
            showLogin();
            return;
        }
        
        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            
            if (response.ok) {
                const data = await response.json();
                currentUser = data.user;
                await loadUsers();
                connectWebSocket();
                showMainApp();
            } else {
                localStorage.removeItem('token');
                showLogin();
            }
        } catch (error) {
            showLogin();
        }
    }
    
    async function loadUsers() {
        const response = await fetch('/api/users');
        users = await response.json();
    }
    
    function showLogin() {
        document.getElementById('app').innerHTML = `
            <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0e1621;">
                <div class="login-screen">
                    <h1>📱 Vanogram</h1>
                    <p>Введите номер телефона для входа</p>
                    <input type="tel" id="phone" placeholder="+7 XXX XXX XX XX" value="+7">
                    <input type="text" id="name" placeholder="Ваше имя (необязательно)">
                    <button id="loginBtn">Войти / Зарегистрироваться</button>
                    <div class="error" id="errorMsg"></div>
                </div>
            </div>
        `;
        
        document.getElementById('loginBtn').onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const name = document.getElementById('name').value.trim();
            
            if (!phone || phone.length < 10) {
                document.getElementById('errorMsg').textContent = 'Введите корректный номер телефона';
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, name })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    token = data.token;
                    currentUser = data.user;
                    await loadUsers();
                    connectWebSocket();
                    showMainApp();
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'Ошибка';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Ошибка соединения с сервером';
            }
        };
    }
    
    // ========== WEBSOCKET ==========
    function connectWebSocket() {
        socket = io(SERVER_URL);
        
        socket.on('connect', () => {
            socket.emit('auth', currentUser.id);
        });
        
        socket.on('chat history', (history) => {
            messages = history;
            if (currentChatUser) renderMessages();
        });
        
        socket.on('new message', (message) => {
            messages.push(message);
            if (currentChatUser && (message.userId === currentChatUser.id || message.userId === currentUser.id)) {
                renderMessages();
            }
        });
        
        socket.on('users online', (onlineIds) => {
            updateOnlineStatus(onlineIds);
        });
        
        socket.on('users list', (updatedUsers) => {
            users = updatedUsers;
            if (currentChatUser) {
                const updated = users.find(u => u.id === currentChatUser.id);
                if (updated) currentChatUser = updated;
            }
            renderContactsList();
        });
        
        socket.on('user typing', (data) => {
            const typingEl = document.getElementById('typingIndicator');
            if (typingEl && currentChatUser && data.userId === currentChatUser.id) {
                if (data.isTyping) {
                    typingEl.textContent = '✏️ Печатает...';
                    typingEl.style.display = 'block';
                } else {
                    typingEl.style.display = 'none';
                }
            }
        });
    }
    
    function updateOnlineStatus(onlineIds) {
        for (let user of users) {
            user.online = onlineIds.includes(user.id);
        }
        renderContactsList();
        
        if (currentChatUser) {
            const statusEl = document.getElementById('chatStatus');
            if (statusEl) {
                statusEl.innerHTML = currentChatUser.online ? '<span class="online-dot"></span> Онлайн' : 'Был(а) недавно';
            }
        }
        
        const onlineCount = document.getElementById('onlineCount');
        if (onlineCount) {
            onlineCount.innerHTML = `🌟 ${onlineIds.length} онлайн`;
        }
    }
    
    // ========== ОТОБРАЖЕНИЕ ==========
    function showMainApp() {
        renderMainApp();
        renderContactsList();
        if (currentChatUser) {
            renderMessages();
        }
    }
    
    function renderMainApp() {
        document.getElementById('app').innerHTML = `
            <div class="app">
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <div class="user-card">
                            <img src="${currentUser.avatar}" class="user-avatar">
                            <div class="user-info">
                                <div class="user-name">${escapeHtml(currentUser.name)}</div>
                                <div class="user-phone">${escapeHtml(currentUser.phone)}</div>
                            </div>
                        </div>
                        <div class="online-count" id="onlineCount">🌟 Загрузка...</div>
                    </div>
                    <div class="contacts-title">📱 КОНТАКТЫ</div>
                    <div class="contacts-list" id="contactsList"></div>
                </div>
                <div class="main-chat" id="mainChat">
                    <div class="chat-header" id="chatHeader">
                        <img src="" id="chatAvatar" class="chat-header-avatar" style="display: none;">
                        <div class="chat-header-info">
                            <div class="chat-header-name" id="chatName">Выберите чат</div>
                            <div class="chat-header-status" id="chatStatus"></div>
                        </div>
                    </div>
                    <div class="messages-area" id="messagesArea"></div>
                    <div class="typing-indicator" id="typingIndicator" style="display: none;"></div>
                    <div class="input-area" id="inputArea" style="display: none;">
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <button id="sendBtn">📤</button>
                    </div>
                </div>
            </div>
        `;
        
        // Кнопка меню для телефона
        const menuBtn = document.getElementById('menuBtn');
        if (menuBtn) {
            menuBtn.style.display = 'block';
            menuBtn.onclick = () => {
                document.getElementById('sidebar').classList.toggle('open');
            };
        }
        
        // Настройка отправки сообщений
        const sendBtn = document.getElementById('sendBtn');
        const input = document.getElementById('messageInput');
        
        if (sendBtn) {
            sendBtn.onclick = sendMessage;
        }
        if (input) {
            input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
            
            let typingTimeout;
            input.oninput = () => {
                socket.emit('typing', true);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => socket.emit('typing', false), 1000);
            };
        }
        
        if (currentChatUser) {
            selectChat(currentChatUser);
        }
    }
    
    function renderContactsList() {
        const container = document.getElementById('contactsList');
        if (!container) return;
        
        container.innerHTML = '';
        
        // Показываем всех пользователей, кроме текущего
        const otherUsers = users.filter(u => u.id !== currentUser.id);
        
        if (otherUsers.length === 0) {
            container.innerHTML = '<div style="color: #6c7883; padding: 20px; text-align: center;">Пока нет других пользователей<br>Поделитесь ссылкой с друзьями!</div>';
        }
        
        for (const user of otherUsers) {
            const div = document.createElement('div');
            div.className = `contact-item ${currentChatUser?.id === user.id ? 'active' : ''}`;
            div.innerHTML = `
                <img src="${user.avatar}" class="contact-avatar">
                <div class="contact-info">
                    <div class="contact-name">${escapeHtml(user.name)}</div>
                    <div class="contact-status">
                        ${user.online ? '<span class="online-dot"></span> Онлайн' : user.phone}
                    </div>
                </div>
            `;
            div.onclick = () => selectChat(user);
            container.appendChild(div);
        }
    }
    
    function selectChat(user) {
        currentChatUser = user;
        
        const chatName = document.getElementById('chatName');
        const chatStatus = document.getElementById('chatStatus');
        const chatAvatar = document.getElementById('chatAvatar');
        const inputArea = document.getElementById('inputArea');
        
        if (chatName) chatName.textContent = user.name;
        if (chatStatus) {
            chatStatus.innerHTML = user.online ? '<span class="online-dot"></span> Онлайн' : 'Был(а) недавно';
        }
        if (chatAvatar) {
            chatAvatar.src = user.avatar;
            chatAvatar.style.display = 'block';
        }
        if (inputArea) inputArea.style.display = 'flex';
        
        // Закрываем меню на телефоне
        const sidebar = document.getElementById('sidebar');
        if (sidebar && window.innerWidth <= 768) {
            sidebar.classList.remove('open');
        }
        
        renderMessages();
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatUser) return;
        
        socket.emit('send message', { text: text });
        input.value = '';
        socket.emit('typing', false);
    }
    
    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if (!container) return;
        
        container.innerHTML = '';
        
        // Фильтруем сообщения для текущего чата (общий чат для всех)
        const chatMessages = messages;
        
        for (const msg of chatMessages) {
            const isSent = msg.userId === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            
            let content = '';
            if (msg.image) {
                content = `<img src="${msg.image}" class="message-image" onclick="window.open(this.src)">`;
            } else if (msg.audio) {
                content = `<div class="bubble">🎤 Голосовое сообщение</div>`;
            } else {
                content = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
            }
            
            div.innerHTML = `
                ${!isSent ? `<div class="message-name">${escapeHtml(msg.userName)}</div>` : ''}
                ${content}
                <div class="message-info">${formatTime()}</div>
            `;
            container.appendChild(div);
        }
        
        container.scrollTop = container.scrollHeight;
    }
    
    // ========== ЗАПУСК ==========
    checkAuth();
</script>
</body>
</html>
