<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vanogram | Мессенджер</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Контейнер чата */
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 700px;
            background: #17212b;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Шапка */
        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-info {
            flex: 1;
        }

        .header-info h2 {
            font-size: 18px;
            margin-bottom: 2px;
        }

        .header-info p {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: #242f3d;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-info {
            font-size: 10px;
            color: #6c7883;
            margin: 3px 8px 0;
            display: flex;
            gap: 8px;
        }

        .sent .message-info {
            justify-content: flex-end;
        }

        .message-name {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 4px;
            color: #2aab6e;
        }

        /* Ввод сообщения */
        .input-area {
            background: #17212b;
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #242f3d;
        }

        #messageInput {
            flex: 1;
            padding: 12px 15px;
            background: #242f3d;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #messageInput::placeholder {
            color: #6c7883;
        }

        #sendBtn {
            background: #2b5278;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        /* Экран входа по телефону */
        .login-screen {
            background: #17212b;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
        }

        .login-screen h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .login-screen p {
            color: #6c7883;
            margin-bottom: 30px;
        }

        .login-screen input {
            width: 100%;
            padding: 15px;
            background: #242f3d;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }

        .login-screen button {
            width: 100%;
            padding: 15px;
            background: #2aab6e;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .login-screen .back-btn {
            background: #6c7883;
        }

        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .code-inputs input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            padding: 0;
        }

        .timer {
            color: #6c7883;
            font-size: 14px;
            margin: 10px 0;
        }

        .error {
            color: #ff6666;
            font-size: 12px;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div id="app"></div>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<!-- Firebase SDK -->
<script type="module">
    // ========== FIREBASE КОНФИГУРАЦИЯ ==========
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPhoneNumber, RecaptchaVerifier, onAuthStateChanged, PhoneAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    // 🔥 ВАШ firebaseConfig (скопирован из консоли Firebase)
    const firebaseConfig = {
        apiKey: "AIzaSyCBFv9Ls7CckQnHfxFQRLNr8aqjgKbPcVw",
        authDomain: "vanogram-web.firebaseapp.com",
        projectId: "vanogram-web",
        storageBucket: "vanogram-web.firebasestorage.app",
        messagingSenderId: "903317318632",
        appId: "1:903317318632:web:102eb598260c61b86b125d",
        measurementId: "G-EM1QGH39X2"
    };
    
    // Инициализация Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    let socket = null;
    let currentUser = null;
    let currentChat = null;
    let messages = [];
    let verificationId = null;
    let timerInterval = null;
    
    // Сервер WebSocket (ваш Render)
    const SERVER_URL = "https://my-messenger-oura.onrender.com";
    
    // Экранирование HTML
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // === ЭКРАН ВВОДА НОМЕРА ТЕЛЕФОНА ===
    function showPhoneLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-screen">
                <h1>📱 Vanogram</h1>
                <p>Введите номер телефона для входа</p>
                <input type="tel" id="phoneNumber" placeholder="+7 XXX XXX XX XX" value="+7">
                <button id="sendCodeBtn">Отправить код</button>
                <div id="recaptcha-container"></div>
                <div class="error" id="errorMsg"></div>
            </div>
        `;
        
        // Инициализация reCAPTCHA
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'normal',
            'callback': () => console.log('reCAPTCHA решена')
        });
        
        document.getElementById('sendCodeBtn').onclick = async () => {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            if (!phoneNumber || phoneNumber.length < 10) {
                showError('Введите корректный номер телефона');
                return;
            }
            
            try {
                document.getElementById('sendCodeBtn').disabled = true;
                document.getElementById('sendCodeBtn').textContent = 'Отправка...';
                
                const appVerifier = window.recaptchaVerifier;
                const confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, appVerifier);
                verificationId = confirmationResult.verificationId;
                showCodeVerification();
                
            } catch (error) {
                console.error(error);
                showError('Ошибка: ' + error.message);
                document.getElementById('sendCodeBtn').disabled = false;
                document.getElementById('sendCodeBtn').textContent = 'Отправить код';
                window.recaptchaVerifier.clear();
            }
        };
    }
    
    // === ЭКРАН ВВОДА КОДА ===
    function showCodeVerification() {
        document.getElementById('app').innerHTML = `
            <div class="login-screen">
                <h1>📱 Vanogram</h1>
                <p>Введите код из SMS</p>
                <div class="code-inputs">
                    <input type="text" maxlength="1" id="code1" class="code-input">
                    <input type="text" maxlength="1" id="code2" class="code-input">
                    <input type="text" maxlength="1" id="code3" class="code-input">
                    <input type="text" maxlength="1" id="code4" class="code-input">
                    <input type="text" maxlength="1" id="code5" class="code-input">
                    <input type="text" maxlength="1" id="code6" class="code-input">
                </div>
                <button id="verifyBtn">Подтвердить</button>
                <button id="backBtn" class="back-btn">Назад</button>
                <div class="timer" id="timer">Отправить код повторно через 60 сек</div>
                <div class="error" id="errorMsg"></div>
            </div>
        `;
        
        // Автоматический переход между полями
        const inputs = document.querySelectorAll('.code-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
        
        // Таймер для повторной отправки
        let timeLeft = 60;
        const timerElement = document.getElementById('timer');
        timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerElement.innerHTML = '<button id="resendBtn" style="background: none; border: none; color: #2aab6e;">Отправить код повторно</button>';
                document.getElementById('resendBtn')?.addEventListener('click', () => {
                    location.reload();
                });
            } else {
                timerElement.textContent = `Отправить код повторно через ${timeLeft} сек`;
            }
        }, 1000);
        
        document.getElementById('verifyBtn').onclick = async () => {
            let code = '';
            for (let i = 1; i <= 6; i++) {
                code += document.getElementById(`code${i}`).value;
            }
            
            if (code.length !== 6) {
                showError('Введите 6-значный код');
                return;
            }
            
            try {
                const credential = PhoneAuthProvider.credential(verificationId, code);
                await auth.signInWithCredential(credential);
                clearInterval(timerInterval);
                
            } catch (error) {
                console.error(error);
                showError('Неверный код. Попробуйте снова.');
            }
        };
        
        document.getElementById('backBtn').onclick = () => {
            clearInterval(timerInterval);
            location.reload();
        };
    }
    
    // === ОСНОВНОЙ ЧАТ ===
    function startChat(phoneNumber) {
        // Подключаемся к Socket.IO серверу
        socket = io(SERVER_URL);
        
        socket.on('connect', () => {
            console.log('Socket.IO подключен');
            socket.emit('user join', phoneNumber);
        });
        
        socket.on('chat history', (history) => {
            messages = history;
            renderMessages();
        });
        
        socket.on('new message', (message) => {
            messages.push(message);
            renderMessages();
        });
        
        socket.on('users list', (users) => {
            const count = users.length;
            const onlineEl = document.getElementById('onlineCount');
            if (onlineEl) onlineEl.innerHTML = `${count} онлайн`;
        });
        
        renderChatUI(phoneNumber);
    }
    
    function renderChatUI(phoneNumber) {
        document.getElementById('app').innerHTML = `
            <div class="chat-container">
                <div class="chat-header">
                    <div class="avatar">📱</div>
                    <div class="header-info">
                        <h2>${escapeHtml(phoneNumber)}</h2>
                        <p id="onlineCount">Подключение...</p>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                    <button id="sendBtn">📤</button>
                </div>
            </div>
        `;
        
        renderMessages();
        
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        const sendMessage = () => {
            const text = input.value.trim();
            if (!text) return;
            
            socket.emit('send message', { text: text });
            input.value = '';
        };
        
        sendBtn.onclick = sendMessage;
        input.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
    }
    
    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if (!container) return;
        
        container.innerHTML = '';
        
        for (const msg of messages) {
            const isSent = msg.userId === socket?.id;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            
            if (isSent) {
                div.innerHTML = `
                    <div class="bubble">${escapeHtml(msg.text)}</div>
                    <div class="message-info">${formatTime()}</div>
                `;
            } else {
                div.innerHTML = `
                    <div class="bubble">
                        <div class="message-name">${escapeHtml(msg.userName)}</div>
                        <div>${escapeHtml(msg.text)}</div>
                    </div>
                    <div class="message-info">${formatTime()}</div>
                `;
            }
            container.appendChild(div);
        }
        
        container.scrollTop = container.scrollHeight;
    }
    
    function showError(msg) {
        const errorEl = document.getElementById('errorMsg');
        if (errorEl) {
            errorEl.textContent = msg;
            setTimeout(() => errorEl.textContent = '', 3000);
        }
    }
    
    // === СЛУШАЕМ ИЗМЕНЕНИЕ СОСТОЯНИЯ АВТОРИЗАЦИИ ===
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            startChat(user.phoneNumber);
        } else {
            showPhoneLogin();
        }
    });
</script>
</body>
</html>
