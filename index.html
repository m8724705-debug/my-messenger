<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vanogram | Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
        }

        .sidebar {
            width: 320px;
            background: #17212b;
            border-right: 1px solid #242f3d;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .user-status {
            color: #6c7883;
            font-size: 12px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #2aab6e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .search-box {
            padding: 12px 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px;
            background: #242f3d;
            border: none;
            border-radius: 20px;
            color: white;
            outline: none;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #242f3d;
        }

        .chat-item:hover {
            background: #1e2a36;
        }

        .chat-item.active {
            background: #2b5278;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            color: white;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-status {
            color: #6c7883;
            font-size: 12px;
        }

        .online-status {
            color: #2aab6e;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0e1621;
        }

        .chat-header {
            padding: 12px 20px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-name {
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .chat-header-status {
            color: #6c7883;
            font-size: 12px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 65%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: #17212b;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .message-time {
            font-size: 10px;
            color: #6c7883;
            margin-top: 4px;
        }

        .sent .message-time {
            text-align: right;
        }

        .message-name {
            font-size: 12px;
            color: #2aab6e;
            margin-bottom: 4px;
        }

        .input-area {
            background: #17212b;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #242f3d;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 12px;
            background: #242f3d;
            border-radius: 28px;
            padding: 8px 16px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: #6c7883;
        }

        #messageInput {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }

        #messageInput::placeholder {
            color: #6c7883;
        }

        #sendBtn {
            background: #2b5278;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .login-screen {
            background: #17212b;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
        }

        .login-screen h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .login-screen p {
            color: #6c7883;
            margin-bottom: 30px;
        }

        .login-screen input {
            width: 100%;
            padding: 15px;
            background: #242f3d;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }

        .login-screen button {
            width: 100%;
            padding: 15px;
            background: #2aab6e;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            color: #ff6666;
            margin-top: 10px;
        }

        .menu-btn {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s;
                width: 80%;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-btn {
                display: block;
                position: fixed;
                left: 16px;
                top: 16px;
                z-index: 1001;
                background: #2b5278;
                border: none;
                width: 44px;
                height: 44px;
                border-radius: 50%;
                color: white;
                font-size: 20px;
                cursor: pointer;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
<button class="menu-btn" id="menuBtn">☰</button>
<div id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let token = localStorage.getItem('token');
    let deviceId = localStorage.getItem('deviceId');
    let currentUser = null;
    let socket = null;
    let messages = [];
    let users = [];
    let currentChat = null;

    function getDeviceId() {
        if (!deviceId) {
            deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 16);
            localStorage.setItem('deviceId', deviceId);
        }
        return deviceId;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTime(timestamp) {
        return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    async function checkAuth() {
        if (!token) { showLogin(); return; }
        try {
            const res = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            if (res.ok) {
                const data = await res.json();
                currentUser = data.user;
                await loadUsers();
                connectSocket();
                showMainApp();
            } else {
                localStorage.removeItem('token');
                showLogin();
            }
        } catch(e) { showLogin(); }
    }

    async function loadUsers() {
        try {
            const res = await fetch('/api/users');
            users = await res.json();
            console.log('📋 Загружено пользователей:', users.length);
        } catch(e) {
            console.error('Ошибка загрузки пользователей:', e);
        }
    }

    function showLogin() {
        document.getElementById('app').innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0e1621;">
                <div class="login-screen">
                    <h1>📱 Vanogram</h1>
                    <p>Введите номер телефона</p>
                    <input type="tel" id="phone" placeholder="+7 XXX XXX XX XX" value="+7">
                    <input type="text" id="name" placeholder="Ваше имя">
                    <button id="loginBtn">Войти</button>
                    <div class="error" id="errorMsg"></div>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const name = document.getElementById('name').value.trim();
            if (!phone || phone.length < 10) {
                document.getElementById('errorMsg').textContent = 'Введите корректный номер';
                return;
            }
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, name, deviceId: getDeviceId() })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    token = data.token;
                    currentUser = data.user;
                    await loadUsers();
                    connectSocket();
                    showMainApp();
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'Ошибка';
                }
            } catch(e) {
                document.getElementById('errorMsg').textContent = 'Ошибка соединения';
            }
        };
    }

    function connectSocket() {
        socket = io();
        
        socket.on('connect', () => {
            console.log('✅ WebSocket подключен');
            socket.emit('auth', currentUser.id);
        });
        
        socket.on('history', (history) => {
            messages = history;
            if (currentChat) renderMessages();
        });
        
        socket.on('new_message', (msg) => {
            const exists = messages.some(m => m.id === msg.id);
            if (!exists) {
                messages.push(msg);
                if (currentChat && (msg.fromId === currentChat.id || msg.toId === currentChat.id)) {
                    renderMessages();
                }
                updateChatsList();
            }
        });
        
        socket.on('message_sent', (msg) => {
            const exists = messages.some(m => m.id === msg.id);
            if (!exists) {
                messages.push(msg);
                if (currentChat && (msg.fromId === currentChat.id || msg.toId === currentChat.id)) {
                    renderMessages();
                }
            }
        });
        
        // Получение списка пользователей
        socket.on('users_list', (list) => {
            users = list;
            updateChatsList();
            updateChatHeader();
            console.log('📋 Обновлён список пользователей:', users.length);
        });
        
        // Обновление онлайн статуса
        socket.on('user_online', (data) => {
            const user = users.find(u => u.id === data.userId);
            if (user) {
                user.online = data.online;
                updateChatsList();
                if (currentChat && currentChat.id === data.userId) {
                    updateChatHeader();
                }
                console.log(`🟢 ${user.name}: ${data.online ? 'онлайн' : 'офлайн'}`);
            }
        });
    }

    function showMainApp() {
        renderMainApp();
        updateChatsList();
    }

    function renderMainApp() {
        document.getElementById('app').innerHTML = `
            <div class="container">
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <div class="user-card" id="profileBtn">
                            <img src="${currentUser.avatar}" class="user-avatar">
                            <div class="user-info">
                                <div class="user-name">${escapeHtml(currentUser.name)}</div>
                                <div class="user-status" id="userStatus"></div>
                            </div>
                        </div>
                    </div>
                    <div class="search-box">
                        <input type="text" class="search-input" id="searchInput" placeholder="Поиск">
                    </div>
                    <div class="chats-list" id="chatsList"></div>
                </div>
                <div class="main-chat">
                    <div class="chat-header" id="chatHeader" style="display: none;">
                        <img src="" id="chatAvatar" class="chat-header-avatar">
                        <div class="chat-header-info">
                            <div class="chat-header-name" id="chatName"></div>
                            <div class="chat-header-status" id="chatStatus"></div>
                        </div>
                    </div>
                    <div class="messages-area" id="messagesArea"></div>
                    <div class="input-area" id="inputArea" style="display: none;">
                        <div class="input-wrapper">
                            <button class="icon-btn" id="photoBtn">📷</button>
                            <input type="text" id="messageInput" placeholder="Сообщение...">
                        </div>
                        <button id="sendBtn">📤</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('profileBtn')?.addEventListener('click', showProfile);
        document.getElementById('photoBtn')?.addEventListener('click', selectPhoto);
        
        const sendBtn = document.getElementById('sendBtn');
        const input = document.getElementById('messageInput');
        if (sendBtn) sendBtn.onclick = sendMessage;
        if (input) input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.oninput = (e) => {
                const query = e.target.value.toLowerCase();
                document.querySelectorAll('.chat-item').forEach(item => {
                    const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
                    item.style.display = name.includes(query) ? 'flex' : 'none';
                });
            };
        }
        
        const menuBtn = document.getElementById('menuBtn');
        if (menuBtn) {
            menuBtn.onclick = () => document.getElementById('sidebar').classList.toggle('open');
        }
        
        document.getElementById('userStatus').innerHTML = '<span class="online-dot"></span> Онлайн';
    }

    function updateChatsList() {
        const container = document.getElementById('chatsList');
        if (!container) return;
        
        const otherUsers = users.filter(u => u.id !== currentUser?.id);
        
        if (otherUsers.length === 0) {
            container.innerHTML = '<div style="padding:20px;color:#6c7883;text-align:center;">Нет других пользователей<br><br>Пригласите друзей!</div>';
            return;
        }
        
        container.innerHTML = '';
        
        for (const user of otherUsers) {
            const div = document.createElement('div');
            div.className = `chat-item ${currentChat?.id === user.id ? 'active' : ''}`;
            div.innerHTML = `
                <img src="${user.avatar}" class="chat-avatar">
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(user.name)}</div>
                    <div class="chat-status ${user.online ? 'online-status' : ''}">
                        ${user.online ? '🟢 Онлайн' : '⚫ Не в сети'}
                    </div>
                </div>
            `;
            div.onclick = () => selectChat(user);
            container.appendChild(div);
        }
    }

    function selectChat(user) {
        currentChat = user;
        
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('inputArea').style.display = 'flex';
        
        document.getElementById('chatAvatar').src = user.avatar;
        document.getElementById('chatName').textContent = user.name;
        document.getElementById('chatStatus').innerHTML = user.online ? '<span class="online-dot"></span> Онлайн' : 'Не в сети';
        
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
        }
        
        renderMessages();
    }

    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if (!container || !currentChat) return;
        
        const chatMessages = messages.filter(m => 
            (m.fromId === currentChat.id && m.toId === currentUser.id) ||
            (m.fromId === currentUser.id && m.toId === currentChat.id)
        );
        
        container.innerHTML = '';
        
        for (const msg of chatMessages) {
            const isSent = msg.fromId === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            
            let content = '';
            if (msg.image) {
                content = `<img src="${msg.image}" class="message-image" onclick="window.open(this.src)">`;
            } else {
                content = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
            }
            
            div.innerHTML = `
                ${!isSent ? `<div class="message-name">${escapeHtml(msg.fromName)}</div>` : ''}
                ${content}
                <div class="message-time">${formatTime(msg.time)}</div>
            `;
            container.appendChild(div);
        }
        
        container.scrollTop = container.scrollHeight;
    }

    function updateChatHeader() {
        if (currentChat) {
            const user = users.find(u => u.id === currentChat.id);
            if (user) {
                const statusEl = document.getElementById('chatStatus');
                if (statusEl) {
                    statusEl.innerHTML = user.online ? '<span class="online-dot"></span> Онлайн' : 'Не в сети';
                }
            }
        }
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChat) return;
        
        socket.emit('message', {
            toId: currentChat.id,
            text: text
        });
        
        input.value = '';
    }

    function selectPhoto() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                socket.emit('message', {
                    toId: currentChat.id,
                    text: '📷 Фото',
                    image: event.target.result
                });
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    function showProfile() {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:2000;';
        modal.innerHTML = `
            <div style="background:#17212b;border-radius:20px;padding:32px;width:90%;max-width:350px;text-align:center;">
                <img src="${currentUser.avatar}" style="width:100px;height:100px;border-radius:50%;margin-bottom:16px;">
                <div style="color:white;font-size:20px;font-weight:600;margin-bottom:8px;">${escapeHtml(currentUser.name)}</div>
                <div style="color:#6c7883;margin-bottom:24px;">${escapeHtml(currentUser.phone)}</div>
                <button id="logoutBtn" style="width:100%;padding:12px;background:#e53935;border:none;border-radius:12px;color:white;font-size:16px;cursor:pointer;">Выйти</button>
                <button id="closeModal" style="width:100%;margin-top:12px;padding:12px;background:#242f3d;border:none;border-radius:12px;color:white;cursor:pointer;">Отмена</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('token');
            localStorage.removeItem('deviceId');
            location.reload();
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }

    checkAuth();
</script>
</body>
</html>
