<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vanogram | Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0e1621;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Стили для мобильной и десктопной версии */
        .chat {
            width: 100%;
            max-width: 550px;
            height: 100vh;
            max-height: 700px;
            background: #17212b;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            position: relative;
        }

        /* Шапка чата */
        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .online-status {
            font-size: 12px;
            font-weight: normal;
            opacity: 0.8;
        }

        /* Область сообщений */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%2317212b"/><circle cx="20" cy="20" r="2" fill="%23242f3d"/><circle cx="50" cy="50" r="2" fill="%23242f3d"/><circle cx="80" cy="30" r="2" fill="%23242f3d"/></svg>');
        }

        /* Стили сообщений */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: #242f3d;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-info {
            font-size: 10px;
            color: #6c7883;
            margin: 3px 8px 0;
        }

        .sent .message-info {
            text-align: right;
        }

        .message-name {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 4px;
            color: #2aab6e;
        }

        /* Сообщение с изображением */
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        /* Панель ввода */
        .input-area {
            background: #17212b;
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #242f3d;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: #242f3d;
            border-radius: 25px;
            padding: 5px 15px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #messageInput::placeholder {
            color: #6c7883;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #6c7883;
            padding: 0 5px;
        }

        #sendBtn {
            background: #2b5278;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.1s;
        }

        #sendBtn:active {
            transform: scale(0.95);
        }

        /* Экран входа */
        .login-screen {
            background: #17212b;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
        }

        .login-screen h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .login-screen p {
            color: #6c7883;
            margin-bottom: 30px;
        }

        .login-screen input {
            width: 100%;
            padding: 15px;
            background: #242f3d;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }

        .login-screen button {
            width: 100%;
            padding: 15px;
            background: #2aab6e;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            color: #ff6666;
            font-size: 12px;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div id="app"></div>

<!-- Подключаем Socket.IO и сам скрипт -->
<script src="/socket.io/socket.io.js"></script>
<script>
    let socket;
    let currentUser = null;

    // Функция для отображения экрана входа
    function showLogin() {
        document.getElementById('app').innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0e1621;">
                <div class="login-screen">
                    <h1>📱 Vanogram</h1>
                    <p>Введите ваше имя</p>
                    <input type="text" id="username" placeholder="Ваше имя" maxlength="20">
                    <button id="joinBtn">Войти в чат</button>
                    <div class="error" id="errorMsg"></div>
                </div>
            </div>
        `;

        document.getElementById('joinBtn').onclick = () => {
            const name = document.getElementById('username').value.trim();
            if (!name) {
                document.getElementById('errorMsg').innerText = 'Введите ваше имя!';
                return;
            }
            currentUser = { name: name };
            initChat();
        };
    }

    // Инициализация чата
    function initChat() {
        // Подключаемся к сокет-серверу
        socket = io();

        socket.on('connect', () => {
            console.log('Подключено к серверу');
        });

        // Загружаем историю сообщений
        socket.on('chat history', (history) => {
            renderMessages(history);
        });

        // Получаем новое сообщение
        socket.on('chat message', (msg) => {
            addMessageToChat(msg);
        });

        // Рендерим интерфейс чата
        renderChatUI();
    }

    // Отрисовка интерфейса чата
    function renderChatUI() {
        document.getElementById('app').innerHTML = `
            <div class="chat">
                <div class="chat-header">
                    <span>💬 Vanogram</span>
                    <span class="online-status" id="onlineStatus">🟢 Подключено</span>
                </div>
                <div class="messages" id="messagesList"></div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <button class="icon-btn" id="photoBtn">📷</button>
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                    </div>
                    <button id="sendBtn">📤</button>
                </div>
            </div>
        `;

        // Обработчики событий
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        document.getElementById('photoBtn').onclick = selectPhoto;
    }

    // Отправка текстового сообщения
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;

        const message = {
            id: Date.now(),
            userName: currentUser.name,
            text: text,
            timestamp: Date.now(),
            isImage: false
        };

        socket.emit('chat message', message);
        input.value = '';
    }

    // Выбор и отправка фото
    function selectPhoto() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const message = {
                    id: Date.now(),
                    userName: currentUser.name,
                    text: '📷 Фото',
                    image: event.target.result,
                    timestamp: Date.now(),
                    isImage: true
                };
                socket.emit('chat message', message);
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    // Добавление сообщения в контейнер
    function addMessageToChat(msg) {
        const container = document.getElementById('messagesList');
        if (!container) return;

        const isSent = msg.userName === currentUser.name;
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;

        let content = '';
        if (msg.isImage) {
            content = `<img src="${msg.image}" class="message-image" onclick="window.open(this.src)">`;
        } else {
            content = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
        }

        messageDiv.innerHTML = `
            ${!isSent ? `<div class="message-name">${escapeHtml(msg.userName)}</div>` : ''}
            ${content}
            <div class="message-info">${formatTime(msg.timestamp)}</div>
        `;

        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
    }

    // Отрисовка всей истории сообщений
    function renderMessages(messages) {
        const container = document.getElementById('messagesList');
        if (!container) return;
        container.innerHTML = '';
        for (const msg of messages) {
            addMessageToChat(msg);
        }
    }

    // Вспомогательные функции
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTime(timestamp) {
        return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Запуск приложения
    showLogin();
</script>
</body>
</html>
