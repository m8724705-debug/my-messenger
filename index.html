<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vanogram | Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Контейнеры */
        .auth-container, .chat-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 700px;
            background: #17212b;
            display: flex;
            flex-direction: column;
        }
        
        /* Шапка */
        .header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .header-info { flex: 1; }
        .header-info h2 { font-size: 18px; margin-bottom: 2px; }
        .header-info p { font-size: 12px; opacity: 0.8; }
        
        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.sent { align-self: flex-end; }
        .message.received { align-self: flex-start; }
        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
        }
        .sent .bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .received .bubble {
            background: #242f3d;
            color: white;
            border-bottom-left-radius: 4px;
        }
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }
        .message-audio {
            background: #2b5278;
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .audio-play {
            background: #25d366;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
        }
        .message-info {
            font-size: 10px;
            color: #6c7883;
            margin: 3px 8px 0;
        }
        .sent .message-info { text-align: right; }
        .message-name {
            font-size: 12px;
            margin-bottom: 4px;
            color: #2aab6e;
        }
        
        /* Ввод */
        .input-area {
            background: #17212b;
            padding: 12px 15px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #242f3d;
        }
        .icon-btn {
            background: #242f3d;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: white;
        }
        .input-row { flex: 1; display: flex; gap: 8px; }
        #messageInput {
            flex: 1;
            padding: 12px 15px;
            background: #242f3d;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        #sendBtn {
            background: #2b5278;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        
        /* Экран авторизации */
        .auth-screen {
            background: #17212b;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
        }
        .auth-screen h1 { color: white; margin-bottom: 10px; font-size: 32px; }
        .auth-screen p { color: #6c7883; margin-bottom: 30px; }
        .auth-screen input {
            width: 100%;
            padding: 15px;
            background: #242f3d;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .auth-screen button {
            width: 100%;
            padding: 15px;
            background: #2aab6e;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .switch-btn {
            background: transparent !important;
            color: #2aab6e !important;
        }
        .error { color: #ff6666; font-size: 12px; margin-top: 10px; }
        .hidden { display: none; }
        
        /* Профиль */
        .profile-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 10px;
            background: #242f3d;
            border-radius: 12px;
        }
        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-details { flex: 1; text-align: left; }
        .profile-name { color: white; font-weight: 600; }
        .profile-phone { color: #6c7883; font-size: 12px; }
        .logout-btn {
            background: #6c7883;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        /* Видеозвонок */
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }
        .local-video {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 160px;
            background: #333;
            border-radius: 12px;
            z-index: 2001;
        }
        .remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .call-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 2001;
        }
        .call-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .end-call { background: #ff4444; color: white; }
    </style>
</head>
<body>
<div id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let token = localStorage.getItem('token');
    let currentUser = null;
    let socket = null;
    let messages = [];
    let currentChatId = 'general';
    let mediaRecorder = null;
    let audioChunks = [];
    let peerConnection = null;
    let localStream = null;
    
    const SERVER_URL = window.location.origin;
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    async function checkAuth() {
        if (!token) {
            showAuth();
            return;
        }
        
        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            
            if (response.ok) {
                const data = await response.json();
                currentUser = data.user;
                connectWebSocket();
                showChat();
            } else {
                localStorage.removeItem('token');
                showAuth();
            }
        } catch (error) {
            showAuth();
        }
    }
    
    function showAuth() {
        let isLogin = true;
        
        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <h1>📱 Vanogram</h1>
                    <p>${isLogin ? 'Вход в мессенджер' : 'Создание аккаунта'}</p>
                    <input type="tel" id="phone" placeholder="Номер телефона" value="+7">
                    ${!isLogin ? '<input type="text" id="name" placeholder="Ваше имя">' : ''}
                    <input type="password" id="password" placeholder="Пароль">
                    <button id="submitBtn">${isLogin ? 'Войти' : 'Зарегистрироваться'}</button>
                    <button id="switchBtn" class="switch-btn">${isLogin ? 'Нет аккаунта? Создать' : 'Уже есть аккаунт? Войти'}</button>
                    <div class="error" id="errorMsg"></div>
                </div>
            `;
            
            document.getElementById('submitBtn').onclick = async () => {
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value;
                const errorEl = document.getElementById('errorMsg');
                
                if (!phone || !password) {
                    errorEl.textContent = 'Заполните все поля';
                    return;
                }
                
                try {
                    let response;
                    if (isLogin) {
                        response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ phone, password })
                        });
                    } else {
                        const name = document.getElementById('name')?.value.trim() || phone;
                        response = await fetch('/api/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ phone, name, password })
                        });
                    }
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        localStorage.setItem('token', data.token);
                        token = data.token;
                        currentUser = data.user;
                        connectWebSocket();
                        showChat();
                    } else {
                        errorEl.textContent = data.error || 'Ошибка';
                    }
                } catch (error) {
                    errorEl.textContent = 'Ошибка соединения';
                }
            };
            
            document.getElementById('switchBtn').onclick = () => {
                isLogin = !isLogin;
                renderAuth();
            };
        }
        
        renderAuth();
    }
    
    // ========== WEBSOCKET ==========
    function connectWebSocket() {
        socket = io(SERVER_URL);
        
        socket.on('connect', () => {
            socket.emit('auth', currentUser.id);
        });
        
        socket.on('chat history', (history) => {
            messages = history;
            renderMessages();
        });
        
        socket.on('new message', (message) => {
            messages.push(message);
            renderMessages();
        });
        
        socket.on('users online', (users) => {
            const onlineCount = document.getElementById('onlineCount');
            if (onlineCount) onlineCount.innerHTML = `${users.length} онлайн`;
        });
        
        socket.on('user typing', (data) => {
            const typingEl = document.getElementById('typingIndicator');
            if (typingEl && data.userId !== currentUser.id) {
                if (data.isTyping) {
                    typingEl.textContent = '✏️ Кто-то печатает...';
                    typingEl.style.display = 'block';
                    setTimeout(() => typingEl.style.display = 'none', 2000);
                }
            }
        });
    }
    
    // ========== ЧАТ ==========
    function showChat() {
        renderChatUI();
        
        // Таймер для печатания
        let typingTimeout;
        const input = document.getElementById('messageInput');
        if (input) {
            input.oninput = () => {
                socket.emit('typing', true);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => socket.emit('typing', false), 1000);
            };
        }
    }
    
    function renderChatUI() {
        document.getElementById('app').innerHTML = `
            <div class="chat-container">
                <div class="header">
                    <div class="avatar">👤</div>
                    <div class="header-info">
                        <h2>${escapeHtml(currentUser.name)}</h2>
                        <p id="onlineCount">Подключение...</p>
                    </div>
                    <button class="icon-btn" id="callBtn" style="background: #2aab6e;">📞</button>
                    <button class="icon-btn" id="profileBtn" style="background: #242f3d;">⚙️</button>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div id="typingIndicator" style="padding: 5px 15px; font-size: 11px; color: #6c7883; display: none;"></div>
                <div class="input-area">
                    <button class="icon-btn" id="photoBtn">📷</button>
                    <button class="icon-btn" id="audioBtn">🎤</button>
                    <div class="input-row">
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <button id="sendBtn">📤</button>
                    </div>
                </div>
            </div>
        `;
        
        renderMessages();
        
        // Кнопки
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        document.getElementById('photoBtn').onclick = () => selectPhoto();
        document.getElementById('audioBtn').onclick = () => toggleRecording();
        document.getElementById('callBtn').onclick = () => startVideoCall();
        document.getElementById('profileBtn').onclick = () => showProfile();
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (text) {
            socket.emit('send message', { text: text });
            input.value = '';
        }
    }
    
    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if (!container) return;
        
        container.innerHTML = '';
        
        for (const msg of messages) {
            const isSent = msg.userId === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            
            let content = '';
            if (msg.image) {
                content = `<img src="${msg.image}" class="message-image" onclick="window.open(this.src)">`;
            } else if (msg.audio) {
                content = `
                    <div class="message-audio">
                        <button class="audio-play" onclick="playAudio(this)">▶</button>
                        <audio style="display:none"><source src="${msg.audio}" type="audio/webm"></audio>
                        <span>🎤 Голосовое (${Math.round(msg.audio.length / 1000)} сек)</span>
                    </div>
                `;
            } else {
                content = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
            }
            
            div.innerHTML = `
                ${!isSent && !msg.image ? `<div class="message-name">${escapeHtml(msg.userName)}</div>` : ''}
                ${content}
                <div class="message-info">${formatTime()}</div>
            `;
            container.appendChild(div);
        }
        
        container.scrollTop = container.scrollHeight;
    }
    
    // ========== ФОТО ==========
    function selectPhoto() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    socket.emit('send message', { text: '📷 Фото', image: reader.result });
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    // ========== ГОЛОСОВЫЕ СООБЩЕНИЯ ==========
    let isRecording = false;
    
    async function toggleRecording() {
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    }
    
    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = () => {
                    socket.emit('send message', { text: '🎤 Голосовое', audio: reader.result });
                };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            isRecording = true;
            const audioBtn = document.getElementById('audioBtn');
            if (audioBtn) audioBtn.style.background = '#ff4444';
            
            setTimeout(() => stopRecording(), 10000);
        } catch (error) {
            alert('Нет доступа к микрофону');
        }
    }
    
    function stopRecording() {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            const audioBtn = document.getElementById('audioBtn');
            if (audioBtn) audioBtn.style.background = '#242f3d';
        }
    }
    
    function playAudio(btn) {
        const audio = btn.nextElementSibling;
        if (audio.paused) {
            audio.play();
            btn.textContent = '⏸';
            audio.onended = () => btn.textContent = '▶';
        } else {
            audio.pause();
            btn.textContent = '▶';
        }
    }
    
    // ========== ПРОФИЛЬ ==========
    function showProfile() {
        document.getElementById('app').innerHTML = `
            <div class="auth-screen">
                <h1>👤 Профиль</h1>
                <div class="profile-info">
                    <img src="${currentUser.avatar}" class="profile-avatar">
                    <div class="profile-details">
                        <div class="profile-name">${escapeHtml(currentUser.name)}</div>
                        <div class="profile-phone">${escapeHtml(currentUser.phone)}</div>
                    </div>
                </div>
                <button id="logoutBtn">Выйти</button>
                <button id="backBtn" class="switch-btn">← Назад в чат</button>
            </div>
        `;
        
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('token');
            if (socket) socket.disconnect();
            location.reload();
        };
        document.getElementById('backBtn').onclick = () => showChat();
    }
    
    // ========== ВИДЕОЗВОНОК (WebRTC) ==========
    let localVideo = null;
    let remoteVideo = null;
    
    async function startVideoCall() {
        const modal = document.createElement('div');
        modal.className = 'call-modal';
        modal.innerHTML = `
            <video id="localVideo" class="local-video" autoplay muted></video>
            <video id="remoteVideo" class="remote-video" autoplay></video>
            <div class="call-controls">
                <button class="call-btn end-call" id="endCallBtn">📞</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        localVideo = document.getElementById('localVideo');
        remoteVideo = document.getElementById('remoteVideo');
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
            
            // Инициализация WebRTC
            const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc candidate', event.candidate);
                }
            };
            
            // Создаём offer (упрощённо — для демо)
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('webrtc offer', offer);
            
        } catch (error) {
            alert('Нет доступа к камере');
            modal.remove();
        }
        
        document.getElementById('endCallBtn').onclick = () => {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (peerConnection) peerConnection.close();
            modal.remove();
        };
    }
    
    // ========== ЗАПУСК ==========
    checkAuth();
</script>
</body>
</html>
