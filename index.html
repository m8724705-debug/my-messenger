<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>вЬ® –Ь–µ—Б—Б–µ–љ–і–ґ–µ—А | –І–∞—В —Б –і—А—Г–Ј—М—П–Љ–Є</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            height: 100vh;
            overflow: hidden;
        }

        /* –Ю—Б–љ–Њ–≤–љ–Њ–є –Ї–Њ–љ—В–µ–є–љ–µ—А */
        .app {
            display: flex;
            height: 100vh;
        }

        /* –С–Њ–Ї–Њ–≤–∞—П –њ–∞–љ–µ–ї—М */
        .sidebar {
            width: 320px;
            background: #17212b;
            border-right: 1px solid #242f3d;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 1000;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-toggle {
                display: block;
            }
        }

        .sidebar-toggle {
            display: none;
            position: fixed;
            left: 10px;
            top: 10px;
            z-index: 1001;
            background: #2b5278;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        /* –®–∞–њ–Ї–∞ –±–Њ–Ї–Њ–≤–Њ–є –њ–∞–љ–µ–ї–Є */
        .sidebar-header {
            padding: 20px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2aab6e, #1c8a5a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .user-status {
            font-size: 12px;
            color: #6c7883;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #2aab6e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        /* –Ъ–љ–Њ–њ–Ї–Є */
        .new-chat-btn, .new-group-btn, .settings-btn {
            width: 100%;
            padding: 12px;
            background: #2b5278;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .new-group-btn {
            background: #2aab6e;
        }

        .settings-btn {
            background: #242f3d;
            margin-bottom: 0;
        }

        .new-chat-btn:hover, .new-group-btn:hover, .settings-btn:hover {
            opacity: 0.9;
        }

        /* –°–њ–Є—Б–Њ–Ї —З–∞—В–Њ–≤ */
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #242f3d;
            position: relative;
        }

        .chat-item:hover {
            background: #1e2a36;
        }

        .chat-item.active {
            background: #2b5278;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: #2b5278;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #2aab6e;
            border-radius: 50%;
            border: 2px solid #17212b;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            color: white;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .chat-last-msg {
            color: #6c7883;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 10px;
            color: #6c7883;
        }

        .unread-badge {
            background: #2aab6e;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
        }

        /* –Ю—Б–љ–Њ–≤–љ–∞—П –Њ–±–ї–∞—Б—В—М —З–∞—В–∞ */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0e1621;
        }

        .chat-header {
            padding: 15px 20px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            background: #2b5278;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-header-name {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header-status {
            font-size: 12px;
            color: #6c7883;
        }

        .invite-code {
            background: #242f3d;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #2aab6e;
            cursor: pointer;
        }

        /* –°–Њ–Њ–±—Й–µ–љ–Є—П */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            animation: fadeIn 0.2s ease;
            position: relative;
        }

        .message-sent {
            align-self: flex-end;
        }

        .message-received {
            align-self: flex-start;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
            position: relative;
        }

        .message-sent .bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-received .bubble {
            background: #17212b;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .system-message {
            align-self: center;
            max-width: 90%;
        }

        .system-message .bubble {
            background: #242f3d;
            color: #6c7883;
            text-align: center;
            font-size: 12px;
        }

        .message-name {
            font-size: 11px;
            color: #2aab6e;
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 10px;
            color: #6c7883;
            margin-top: 4px;
        }

        .message-sent .message-time {
            text-align: right;
        }

        /* –Ш–љ–і–Є–Ї–∞—В–Њ—А –њ–µ—З–∞—В–∞–љ–Є—П */
        .typing-indicator {
            padding: 5px 20px;
            font-size: 12px;
            color: #6c7883;
            font-style: italic;
        }

        /* –Т–≤–Њ–і —Б–Њ–Њ–±—Й–µ–љ–Є—П */
        .input-area {
            padding: 15px 20px;
            background: #17212b;
            display: flex;
            gap: 10px;
            border-top: 1px solid #242f3d;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
            background: #242f3d;
            border-radius: 25px;
            padding: 5px 15px;
        }

        #messageInput {
            flex: 1;
            padding: 10px 0;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #messageInput::placeholder {
            color: #6c7883;
        }

        .emoji-btn, .attach-btn {
            background: transparent;
            border: none;
            color: #6c7883;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        #sendBtn {
            background: #2b5278;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.1s;
        }

        #sendBtn:active {
            transform: scale(0.95);
        }

        /* –Ь–Њ–і–∞–ї—М–љ—Л–µ –Њ–Ї–љ–∞ */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: #17212b;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            color: white;
            margin-bottom: 20px;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            background: #242f3d;
            border: none;
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
            outline: none;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #2b5278;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .users-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-item:hover {
            background: #242f3d;
        }

        .close-modal {
            background: #6c7883 !important;
        }

        .hidden {
            display: none;
        }

        /* –≠–Љ–Њ–і–Ј–Є –њ–∞–љ–µ–ї—М */
        .emoji-panel {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: #17212b;
            border-radius: 15px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            z-index: 1000;
            border: 1px solid #242f3d;
        }

        .emoji-panel span {
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            text-align: center;
        }

        .emoji-panel span:hover {
            background: #242f3d;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <button class="sidebar-toggle" onclick="toggleSidebar()">вШ∞</button>
    <div id="app"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let currentUser = null;
        let currentChat = null;
        let chats = [];
        let onlineUsers = [];
        let typingTimeout;
        let emojiPanel = null;

        // –≠–Љ–Њ–і–Ј–Є
        const emojis = ['рЯША', 'рЯШВ', 'рЯШН', 'рЯ•∞', 'рЯШО', 'рЯ§Ф', 'рЯШҐ', 'рЯФ•', 'рЯТА', 'рЯСН', 'вЭ§пЄП', 'рЯОЙ', 'вЬ®', 'в≠Р', 'рЯТђ', 'рЯУ±'];

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            if (date.toDateString() === now.toDateString()) {
                return formatTime(timestamp);
            }
            return date.toLocaleDateString();
        }

        function toggleSidebar() {
            document.querySelector('.sidebar')?.classList.toggle('open');
        }

        // –≠–Ї—А–∞–љ –≤—Е–Њ–і–∞
        function showLogin() {
            document.getElementById('app').innerHTML = `
                <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0e1621;">
                    <div style="background: #17212b; padding: 40px; border-radius: 20px; text-align: center; width: 350px;">
                        <div style="font-size: 60px; margin-bottom: 20px;">вЬ®</div>
                        <h1 style="color: white; margin-bottom: 10px;">–Ь–µ—Б—Б–µ–љ–і–ґ–µ—А</h1>
                        <p style="color: #6c7883; margin-bottom: 30px;">–І–∞—В —Б –і—А—Г–Ј—М—П–Љ–Є –≤ —А–µ–∞–ї—М–љ–Њ–Љ –≤—А–µ–Љ–µ–љ–Є</p>
                        <input type="text" id="username" placeholder="–Т–∞—И–µ –Є–Љ—П" style="width: 100%; padding: 12px; background: #242f3d; border: none; border-radius: 10px; color: white; margin-bottom: 15px;">
                        <button id="loginBtn" style="width: 100%; padding: 12px; background: #2aab6e; border: none; border-radius: 10px; color: white; font-size: 16px; cursor: pointer;">–Т–Њ–є—В–Є</button>
                    </div>
                </div>
            `;
            
            document.getElementById('loginBtn').onclick = () => {
                const name = document.getElementById('username').value.trim();
                if (!name) {
                    alert('–Т–≤–µ–і–Є—В–µ –≤–∞—И–µ –Є–Љ—П');
                    return;
                }
                
                socket = io();
                currentUser = { name: name };
                
                socket.on('connect', () => {
                    socket.emit('register', { name: currentUser.name });
                    setupSocketEvents();
                });
            };
        }

        function setupSocketEvents() {
            // –°–њ–Є—Б–Њ–Ї –њ–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї–µ–є –Њ–љ–ї–∞–є–љ
            socket.on('users list', (users) => {
                onlineUsers = users;
                updateOnlineStatus();
            });
            
            // –°–њ–Є—Б–Њ–Ї —З–∞—В–Њ–≤
            socket.on('chats list', (chatsList) => {
                chats = chatsList;
                renderChatsList();
            });
            
            // –Э–Њ–≤—Л–є —З–∞—В —Б–Њ–Ј–і–∞–љ
            socket.on('chat created', (chat) => {
                chats.unshift(chat);
                renderChatsList();
            });
            
            // –Э–Њ–≤—Л–є —З–∞—В –Њ—В –Ї–Њ–≥–Њ-—В–Њ
            socket.on('new chat', (chat) => {
                chats.unshift(chat);
                renderChatsList();
            });
            
            // –Э–Њ–≤–Њ–µ —Б–Њ–Њ–±—Й–µ–љ–Є–µ
            socket.on('new message', (data) => {
                const chat = chats.find(c => c.id === data.chatId);
                if (chat) {
                    chat.lastMessage = data.message.text;
                    chat.lastMessageTime = data.message.time;
                    if (currentChat?.id === data.chatId) {
                        renderMessages();
                    }
                    renderChatsList();
                } else {
                    // –Ь–Њ–ґ–µ—В –±—Л—В—М –љ–Њ–≤—Л–є —З–∞—В
                    socket.emit('get chats');
                }
            });
            
            // –Я–Њ–і—В–≤–µ—А–ґ–і–µ–љ–Є–µ –Њ—В–њ—А–∞–≤–Ї–Є
            socket.on('message sent', (data) => {
                if (currentChat?.id === data.chatId) {
                    renderMessages();
                }
            });
            
            // –Ш—Б—В–Њ—А–Є—П —З–∞—В–∞
            socket.on('chat history', (data) => {
                if (currentChat?.id === data.chatId) {
                    renderMessagesWithHistory(data.messages);
                }
            });
            
            // –Я–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї—М –њ–µ—З–∞—В–∞–µ—В
            socket.on('user typing', (data) => {
                if (currentChat?.id === data.chatId) {
                    const indicator = document.getElementById('typingIndicator');
                    if (indicator) {
                        if (data.isTyping) {
                            indicator.textContent = `вЬПпЄП ${escapeHtml(data.userName)} –њ–µ—З–∞—В–∞–µ—В...`;
                            indicator.classList.remove('hidden');
                        } else {
                            indicator.classList.add('hidden');
                        }
                    }
                }
            });
            
            // –У—А—Г–њ–њ–∞ —Б–Њ–Ј–і–∞–љ–∞
            socket.on('group joined', (group) => {
                chats.unshift(group);
                renderChatsList();
            });
            
            // –Ю—И–Є–±–Ї–∞
            socket.on('error', (msg) => {
                alert(msg);
            });
            
            renderMainChat();
        }

        function renderMainChat() {
            document.getElementById('app').innerHTML = `
                <div class="app">
                    <div class="sidebar" id="sidebar">
                        <div class="sidebar-header">
                            <div class="user-card">
                                <div class="avatar" onclick="showProfileModal()">${getAvatarEmoji(currentUser?.name || '?')}</div>
                                <div class="user-info">
                                    <div class="user-name">${escapeHtml(currentUser?.name || '')}</div>
                                    <div class="user-status"><span class="online-dot"></span> –Ю–љ–ї–∞–є–љ</div>
                                </div>
                            </div>
                            <button class="new-chat-btn" onclick="showNewChatModal()">вЮХ –Э–Њ–≤—Л–є —З–∞—В</button>
                            <button class="new-group-btn" onclick="showNewGroupModal()">рЯС• –°–Њ–Ј–і–∞—В—М –≥—А—Г–њ–њ—Г</button>
                            <button class="settings-btn" onclick="showJoinGroupModal()">рЯФЧ –Т–Њ–є—В–Є –њ–Њ –Ї–Њ–і—Г</button>
                        </div>
                        <div class="chats-list" id="chatsList"></div>
                    </div>
                    <div class="main-chat">
                        <div class="chat-header" id="chatHeader">
                            <div class="chat-header-info">
                                <div class="chat-header-avatar">рЯТђ</div>
                                <div>
                                    <div class="chat-header-name">–Т—Л–±–µ—А–Є—В–µ —З–∞—В</div>
                                    <div class="chat-header-status"></div>
                                </div>
                            </div>
                        </div>
                        <div class="messages-area" id="messagesArea"></div>
                        <div class="typing-indicator hidden" id="typingIndicator"></div>
                        <div class="input-area" id="inputArea" style="display: none;">
                            <div class="input-wrapper">
                                <button class="emoji-btn" onclick="toggleEmojiPanel()">рЯШК</button>
                                <input type="text" id="messageInput" placeholder="–°–Њ–Њ–±—Й–µ–љ–Є–µ...">
                            </div>
                            <button id="sendBtn">рЯУ§</button>
                        </div>
                    </div>
                </div>
            `;
            
            renderChatsList();
            
            if (currentChat) {
                const headerAvatar = currentChat.type === 'group' ? (currentChat.avatar || 'рЯС•') : (currentChat.avatar || 'рЯТђ');
                document.querySelector('.chat-header-avatar').textContent = headerAvatar;
                document.querySelector('.chat-header-name').textContent = currentChat.name;
                
                if (currentChat.type === 'group' && currentChat.inviteCode) {
                    const inviteSpan = document.createElement('span');
                    inviteSpan.className = 'invite-code';
                    inviteSpan.textContent = `рЯФЧ –Ъ–Њ–і: ${currentChat.inviteCode}`;
                    inviteSpan.onclick = () => {
                        navigator.clipboard.writeText(currentChat.inviteCode);
                        alert('вЬЕ –Ъ–Њ–і —Б–Ї–Њ–њ–Є—А–Њ–≤–∞–љ! –Ю—В–њ—А–∞–≤—М—В–µ –µ–≥–Њ –і—А—Г–Ј—М—П–Љ');
                    };
                    document.querySelector('.chat-header').appendChild(inviteSpan);
                }
                
                document.getElementById('inputArea').style.display = 'flex';
                socket.emit('get chat history', currentChat.id);
                
                const sendBtn = document.getElementById('sendBtn');
                const input = document.getElementById('messageInput');
                
                sendBtn.onclick = sendMessage;
                input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
                input.oninput = () => {
                    socket.emit('typing', { chatId: currentChat.id, isTyping: true });
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => {
                        socket.emit('typing', { chatId: currentChat.id, isTyping: false });
                    }, 1000);
                };
            }
        }

        function renderChatsList() {
            const container = document.getElementById('chatsList');
            if (!container) return;
            
            container.innerHTML = '';
            
            for (const chat of chats) {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChat?.id === chat.id ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="chat-avatar">
                        ${chat.avatar || (chat.type === 'group' ? 'рЯС•' : 'рЯТђ')}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${escapeHtml(chat.name)}
                            ${chat.unread ? `<span class="unread-badge">${chat.unread}</span>` : ''}
                        </div>
                        <div class="chat-last-msg">${escapeHtml(chat.lastMessage?.substring(0, 40) || '–Э–µ—В —Б–Њ–Њ–±—Й–µ–љ–Є–є')}</div>
                    </div>
                    <div class="chat-time">${chat.lastMessageTime ? formatTime(chat.lastMessageTime) : ''}</div>
                `;
                div.onclick = () => {
                    currentChat = chat;
                    renderMainChat();
                    if (window.innerWidth <= 768) {
                        toggleSidebar();
                    }
                };
                container.appendChild(div);
            }
            
            if (chats.length === 0) {
                container.innerHTML = '<div style="color: #6c7883; text-align: center; padding: 40px;">–Э–µ—В —З–∞—В–Њ–≤<br>–°–Њ–Ј–і–∞–є—В–µ –љ–Њ–≤—Л–є —З–∞—В –Є–ї–Є –≥—А—Г–њ–њ—Г</div>';
            }
        }

        function renderMessagesWithHistory(messages) {
            const container = document.getElementById('messagesArea');
            if (!container) return;
            
            container.innerHTML = '';
            
            for (const msg of messages) {
                addMessageToContainer(msg);
            }
            
            container.scrollTop = container.scrollHeight;
        }

        function renderMessages() {
            socket.emit('get chat history', currentChat.id);
        }

        function addMessageToContainer(msg) {
            const container = document.getElementById('messagesArea');
            if (!container) return;
            
            const isSent = msg.from === socket.id;
            const isSystem = msg.isSystem;
            
            const div = document.createElement('div');
            div.className = `message ${isSystem ? 'system-message' : (isSent ? 'message-sent' : 'message-received')}`;
            
            if (isSystem) {
                div.innerHTML = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
            } else {
                div.innerHTML = `
                    ${!isSent ? `<div class="message-name">${escapeHtml(msg.fromName)}</div>` : ''}
                    <div class="bubble">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${formatTime(msg.time)}</div>
                `;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChat) return;
            
            socket.emit('send message', {
                chatId: currentChat.id,
                text: text
            });
            
            socket.emit('typing', { chatId: currentChat.id, isTyping: false });
            input.value = '';
        }

        function updateOnlineStatus() {
            const count = onlineUsers.length;
            const statusDiv = document.querySelector('.user-status');
            if (statusDiv) {
                statusDiv.innerHTML = `<span class="online-dot"></span> ${count} ${getWord(count, '—З–µ–ї–Њ–≤–µ–Ї', '—З–µ–ї–Њ–≤–µ–Ї–∞', '—З–µ–ї–Њ–≤–µ–Ї')} –Њ–љ–ї–∞–є–љ`;
            }
        }

        function getAvatarEmoji(name) {
            const firstChar = name.charAt(0).toUpperCase();
            if (firstChar >= 'A' && firstChar <= 'Z') return firstChar;
            if (firstChar >= '–Р' && firstChar <= '–ѓ') return 'рЯС§';
            return 'рЯШК';
        }

        function getWord(n, one, two, five) {
            n = Math.abs(n) % 100;
            if (n >= 5 && n <= 20) return five;
            n %= 10;
            if (n === 1) return one;
            if (n >= 2 && n <= 4) return two;
            return five;
        }

        function toggleEmojiPanel() {
            if (emojiPanel) {
                emojiPanel.remove();
                emojiPanel = null;
                return;
            }
            
            emojiPanel = document.createElement('div');
            emojiPanel.className = 'emoji-panel';
            for (const emoji of emojis) {
                const span = document.createElement('span');
                span.textContent = emoji;
                span.onclick = () => {
                    const input = document.getElementById('messageInput');
                    if (input) {
                        input.value += emoji;
                        input.focus();
                    }
                    emojiPanel.remove();
                    emojiPanel = null;
                };
                emojiPanel.appendChild(span);
            }
            document.body.appendChild(emojiPanel);
        }

        // –Ь–Њ–і–∞–ї—М–љ—Л–µ –Њ–Ї–љ–∞
        window.showNewChatModal = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>вЮХ –Э–Њ–≤—Л–є —З–∞—В</h3>
                    <div class="users-list" id="usersList"></div>
                    <button class="close-modal" onclick="this.closest('.modal').remove()">–Ю—В–Љ–µ–љ–∞</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';
            
            for (const user of onlineUsers) {
                if (user.id !== socket.id) {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `<div class="avatar" style="width: 32px; height: 32px; font-size: 16px;">${user.avatar || 'рЯС§'}</div> ${escapeHtml(user.name)}`;
                    userDiv.onclick = () => {
                        socket.emit('create private chat', user.id);
                        modal.remove();
                    };
                    usersList.appendChild(userDiv);
                }
            }
        };

        window.showNewGroupModal = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>рЯС• –°–Њ–Ј–і–∞—В—М –≥—А—Г–њ–њ—Г</h3>
                    <input type="text" id="groupName" placeholder="–Э–∞–Ј–≤–∞–љ–Є–µ –≥—А—Г–њ–њ—Л">
                    <button id="createBtn">–°–Њ–Ј–і–∞—В—М</button>
                    <button class="close-modal" onclick="this.closest('.modal').remove()">–Ю—В–Љ–µ–љ–∞</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('createBtn').onclick = () => {
                const name = document.getElementById('groupName').value.trim();
                if (!name) {
                    alert('–Т–≤–µ–і–Є—В–µ –љ–∞–Ј–≤–∞–љ–Є–µ –≥—А—Г–њ–њ—Л');
                    return;
                }
                socket.emit('create group', { name: name });
                modal.remove();
            };
        };

        window.showJoinGroupModal = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>рЯФЧ –Т–Њ–є—В–Є –≤ –≥—А—Г–њ–њ—Г</h3>
                    <input type="text" id="inviteCode" placeholder="–Ъ–Њ–і –њ—А–Є–≥–ї–∞—И–µ–љ–Є—П" style="text-transform: uppercase;">
                    <button id="joinBtn">–Я—А–Є—Б–Њ–µ–і–Є–љ–Є—В—М—Б—П</button>
                    <button class="close-modal" onclick="this.closest('.modal').remove()">–Ю—В–Љ–µ–љ–∞</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('joinBtn').onclick = () => {
                const code = document.getElementById('inviteCode').value.trim().toUpperCase();
                if (!code) {
                    alert('–Т–≤–µ–і–Є—В–µ –Ї–Њ–і');
                    return;
                }
                socket.emit('join group', code);
                modal.remove();
            };
        };

        window.showProfileModal = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>рЯС§ –Я—А–Њ—Д–Є–ї—М</h3>
                    <div style="text-align: center; font-size: 48px; margin-bottom: 15px;">${getAvatarEmoji(currentUser.name)}</div>
                    <div style="color: white; text-align: center; margin-bottom: 15px;">${escapeHtml(currentUser.name)}</div>
                    <button class="close-modal" onclick="this.closest('.modal').remove()">–Ч–∞–Ї—А—Л—В—М</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        // –Ч–∞–њ—Г—Б–Ї
        showLogin();
    </script>
</body>
</html>
